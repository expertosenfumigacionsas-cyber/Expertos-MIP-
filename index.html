<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--card:#ffffff;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--red-btn:#d63031;--table-header:#40526e;--blue-light:#7d89ff;--form-gray:#e9f0f8;--exp-red:#c0392b}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:100}.header-icons{display:flex;gap:20px;align-items:center}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0;overflow-x:auto}.tabs-nav{display:flex;flex:1}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px}.tab.active-tab{background:var(--accent);color:white}.title-bar{background:var(--blue-light);color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;font-weight:700;text-transform:uppercase}.action-bar{background:white;padding:10px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid #eee}.btn-action{background:#f0f2f5;border:1px solid #d1d5db;padding:8px 15px;border-radius:4px;font-size:0.8rem;color:#333;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer}.cert-container{background:white;padding:10px;max-width:800px;margin:auto;border:1px solid #ddd;box-shadow:0 5px 15px rgba(0,0,0,0.1);font-family:'Arial',sans-serif}.cert-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--exp-red);padding-bottom:10px;margin-bottom:10px}.cert-logo{color:var(--exp-red);font-weight:900;font-size:1.4rem;display:flex;align-items:center;gap:5px}.cert-logo i{font-size:1.6rem}.cert-title{text-align:left}.cert-title h1{font-size:1.1rem;color:#333}.cert-title span{color:var(--exp-red);font-size:1.1rem}.cert-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:0.7rem}.cert-table td{border:1px solid #ccc;padding:5px}.cert-label{background:#f0f0f0;font-weight:700;width:25%}.cert-section-title{background:#eee;font-weight:700;padding:5px;font-size:0.75rem;text-align:center;border:1px solid #ccc}.footer-decor{height:10px;background:linear-gradient(90deg, var(--exp-red) 30%, transparent 30%, transparent 70%, var(--exp-red) 70%);margin-top:20px}#menu-overlay{position:fixed;top:0;left:-100%;width:100%;height:100%;background:var(--header-bg);z-index:2000;transition:0.4s;padding:20px}#menu-overlay.open{left:0}</style></head><body><div id="app"><header><div onclick="toggleMenu()" style="cursor:pointer;font-size:1.3rem"><i class="fas fa-bars"></i></div><div class="header-icons"><i class="fas fa-search"></i><i class="fas fa-paint-roller"></i><i class="fas fa-bell"></i><i class="fas fa-user-circle" style="font-size:1.8rem"></i></div></header><div class="tabs-outer"><div class="tabs-nav" id="tabs-list"></div></div><div id="main-content"></div><div id="menu-overlay"><div class="menu-btn-close" onclick="toggleMenu()"><i class="fas fa-times" style="color:white;font-size:1.5rem"></i></div></div></div><script>let openTabs=[];function toggleMenu(){document.getElementById('menu-overlay').classList.toggle('open');}function openModule(id,name){if(!openTabs.find(t=>t.id===id))openTabs.push({id,name,active:true});activateTab(id);}function renderTabs(){const list=document.getElementById('tabs-list');list.innerHTML=openTabs.map(t=>`<div class="tab ${t.active?'active-tab':''}" onclick="activateTab('${t.id}')"><i class="fas fa-file-contract"></i> ${t.name} <i class="fas fa-times" onclick="event.stopPropagation();closeTab('${t.id}')"></i></div>`).join('');}function activateTab(id){openTabs.forEach(t=>t.active=(t.id===id));renderTabs();renderContent(id);}function closeTab(id){openTabs=openTabs.filter(t=>t.id!==id);if(openTabs.length>0)activateTab(openTabs[openTabs.length-1].id);else{document.getElementById('main-content').innerHTML='';renderTabs();}}function renderContent(id){let html=`<div class="action-bar"><div class="btn-action" onclick="window.print()"><i class="fas fa-print"></i> Imprimir</div><div class="btn-action"><i class="fas fa-file-pdf"></i> Descargar PDF</div><div class="btn-action" onclick="closeTab('${id}')"><i class="fas fa-arrow-left"></i> Volver</div></div><div class="cert-container"><div class="cert-header"><div class="cert-logo"><i class="fas fa-bug"></i> Expertos MIP</div><div class="cert-title"><h1>Orden de Trabajo N° <span style="font-size:1.3rem">003782</span></h1></div></div><table class="cert-table"><tr><td class="cert-label">Cliente:</td><td>SPORTY CITY SAS</td><td class="cert-label">Dirección Cliente:</td><td>Carrera 17 #121 - 73</td></tr><tr><td class="cert-label">Contacto:</td><td>SANTIAGO ESTEPA</td><td class="cert-label">Ciudad:</td><td>BOGOTÁ</td></tr><tr><td class="cert-label">Sede:</td><td>SMART FIT SANTA BÁRBARA</td><td class="cert-label">Servicio:</td><td>SERVICIO CONTROL DE PLAGAS</td></tr><tr><td class="cert-label">Técnico:</td><td>JESÚS ANTONIO MARÍN</td><td class="cert-label">Fecha:</td><td>08/07/2026</td></tr></table><div class="cert-section-title">RESUMEN DATOS BÁSICOS DEL SERVICIO</div><table class="cert-table"><tr><td class="cert-label">MÉTODO DE CONTROL:</td><td colspan="3">ASPERSIÓN</td></tr><tr><td class="cert-label">SERVICIO A REALIZAR:</td><td colspan="3">SERVICIO CONTROL DE PLAGAS SEDE SMART FIT SANTA BÁRBARA</td></tr></table><div class="cert-section-title">PRODUCTOS UTILIZADOS</div><table class="cert-table"><tr style="background:#f0f0f0;font-weight:700;text-align:center"><td>DOSIS DE ATAQUE</td><td>INSUMO E INGREDIENTE ACTIVO</td><td>TRATAMIENTO</td></tr><tr style="height:40px"><td></td><td></td><td></td></tr></table><div class="cert-section-title">RECOMENDACIONES DEL TÉCNICO</div><div style="border:1px solid #ccc;min-height:80px;padding:10px;font-size:0.75rem">Se recomienda mantener las áreas limpias y libres de residuos de comida...</div><div class="footer-decor"></div></div>`;document.getElementById('main-content').innerHTML=html;}openModule('cert', 'Ver Certificado');</script></body></html>
