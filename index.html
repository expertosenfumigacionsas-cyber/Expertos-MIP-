<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--card:#ffffff;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--red-btn:#d63031;--table-header:#40526e;--blue-light:#7d89ff;--form-gray:#e9f0f8}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:100}.header-icons{display:flex;gap:20px;align-items:center}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0;overflow-x:auto}.tabs-nav{display:flex;flex:1}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px}.tab.active-tab{background:var(--accent);color:white}.title-bar{background:var(--blue-light);color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;font-weight:700;text-transform:uppercase}.action-bar{background:white;padding:10px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid #eee}.btn-action{background:#f0f2f5;border:1px solid #d1d5db;padding:8px 15px;border-radius:4px;font-size:0.8rem;color:#333;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer}.accordion-bar{background:var(--form-gray);padding:12px 15px;border-radius:4px;display:flex;align-items:center;gap:10px;font-weight:600;font-size:0.85rem;color:#556681;margin-bottom:2px;cursor:pointer}.form-content{padding:15px;background:white;margin-bottom:15px}.form-group{margin-bottom:15px}.form-group label{display:block;font-size:0.8rem;color:#777;margin-bottom:6px;font-weight:600}.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:0.9rem;background:#fcfcfc}.signature-pad{border:1px solid #eee;border-radius:8px;background:#f9f9f9;height:150px;margin-bottom:10px;position:relative}.signature-line{position:absolute;bottom:40px;left:15%;width:70%;height:1px;background:#999}.file-select{background:#e9ecef;padding:8px 15px;border-radius:4px;display:inline-block;font-size:0.85rem;color:#444;border:1px solid #ccc;cursor:pointer}#menu-overlay{position:fixed;top:0;left:-100%;width:100%;height:100%;background:var(--header-bg);z-index:2000;transition:0.4s;padding:20px}#menu-overlay.open{left:0}.menu-btn-close{background:var(--accent);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:30px;cursor:pointer}.menu-item{padding:12px 0;color:white;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;cursor:pointer}.submenu{background:rgba(0,0,0,0.2);padding-left:40px;display:none}.submenu.open{display:block}.submenu-item{padding:10px 0;color:rgba(255,255,255,0.7);font-size:0.85rem;cursor:pointer}</style></head><body><div id="app"><header><div onclick="toggleMenu()" style="cursor:pointer;font-size:1.3rem"><i class="fas fa-bars"></i></div><div class="header-icons"><i class="fas fa-search"></i><i class="fas fa-paint-roller"></i><i class="fas fa-bell"></i><i class="fas fa-user-circle" style="font-size:1.8rem"></i></div></header><div class="tabs-outer"><div class="tabs-nav" id="tabs-list"></div></div><div id="main-content"></div><div id="menu-overlay"><div class="menu-btn-close" onclick="toggleMenu()"><i class="fas fa-times" style="color:white;font-size:1.5rem"></i></div><div class="menu-item" onclick="toggleSub('sub-tecnicos')"><i class="fas fa-motorcycle"></i> <span style="margin-left:10px;flex:1">Técnicos</span><i class="fas fa-chevron-right"></i></div><div class="submenu" id="sub-tecnicos"><div class="submenu-item" onclick="openModule('agenda','Mi agenda')">Mi agenda</div></div></div></div><script>let openTabs=[];function toggleMenu(){document.getElementById('menu-overlay').classList.toggle('open');}function toggleSub(id){document.getElementById(id).classList.toggle('open');}function openModule(id,name){toggleMenu();if(!openTabs.find(t=>t.id===id))openTabs.push({id,name,active:true});activateTab(id);}function renderTabs(){const list=document.getElementById('tabs-list');list.innerHTML=openTabs.map(t=>`<div class="tab ${t.active?'active-tab':''}" onclick="activateTab('${t.id}')"><i class="fas fa-calendar-alt"></i> ${t.name} <i class="fas fa-times" onclick="event.stopPropagation();closeTab('${t.id}')"></i></div>`).join('');}function activateTab(id){openTabs.forEach(t=>t.active=(t.id===id));renderTabs();renderContent(id);}function closeTab(id){openTabs=openTabs.filter(t=>t.id!==id);if(openTabs.length>0)activateTab(openTabs[openTabs.length-1].id);else{document.getElementById('main-content').innerHTML='';renderTabs();}}function renderContent(id){let html='';if(id==='agenda'){html=`<div class="title-bar"><span>DATOS DE LA ORDEN</span></div><div class="action-bar"><div class="btn-action">Ver Certificado</div><div class="btn-action"><i class="fas fa-camera"></i> Ver Fotos</div><div class="btn-action"><i class="fas fa-sync-alt"></i></div><div class="btn-action" onclick="closeTab('agenda')"><i class="fas fa-arrow-left"></i> Volver</div></div><div style="padding:10px"><div class="signature-pad"><div class="signature-line"></div></div><div class="btn-action" style="display:inline-flex"><i class="fas fa-paint-brush"></i> Reiniciar</div><div class="form-group" style="margin-top:20px"><label>Sello</label><div class="file-select">Seleccionar archivo...</div></div><div class="form-group"><label>Estado</label><select><option>Confirmada</option></select></div><div class="accordion-bar"><i class="fas fa-caret-right"></i> Evidencia de Pagos</div><div style="color:#b91c1c;font-size:0.75rem;font-weight:700;margin-top:10px">* Campos obligatorios</div></div>`;}document.getElementById('main-content').innerHTML=html;}openModule('agenda', 'Mi agenda');</script></body></html>
