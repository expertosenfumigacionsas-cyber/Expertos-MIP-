<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--card:#ffffff;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--red-btn:#d63031;--table-header:#40526e}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:100}.header-icons{display:flex;gap:20px;align-items:center}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0;overflow-x:auto}.tabs-nav{display:flex;flex:1}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px}.tab.active-tab{background:var(--accent);color:white}.title-bar{background:#f4f5f7;color:#40526e;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;font-weight:700;border-bottom:1px solid #ddd}#menu-overlay{position:fixed;top:0;left:-100%;width:100%;height:100%;background:var(--header-bg);z-index:2000;transition:0.4s;padding:20px}#menu-overlay.open{left:0}.menu-btn-close{background:var(--accent);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:30px;cursor:pointer}.menu-item{padding:12px 0;color:rgba(255,255,255,0.9);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:0.95rem}.submenu{background:rgba(0,0,0,0.2);padding-left:40px;display:none}.submenu.open{display:block}.submenu-item{padding:10px 0;color:rgba(255,255,255,0.7);font-size:0.85rem;cursor:pointer}/* TABLA AGENDA */.agenda-table{width:100%;border-collapse:collapse;background:white;font-size:0.75rem}.agenda-table th{background:var(--table-header);color:white;padding:12px 8px;text-align:left;font-weight:600;border:1px solid #556681;vertical-align:middle}.agenda-table th i{font-size:0.65rem;margin-left:4px;opacity:0.7}.agenda-table td{padding:15px 8px;border:1px solid #e0e0e0;vertical-align:top;line-height:1.4}.btn-recargar{background:#40526e;color:white;border:none;padding:8px 18px;border-radius:4px;margin:15px;font-weight:600;font-size:0.85rem;cursor:pointer}.num-link{color:inherit;text-decoration:none;font-weight:700}.num-link:active{background:#eee}.pagination-footer{padding:15px;text-align:center;background:white;border-top:1px solid #ddd;font-size:0.8rem;color:#555}.page-btns{display:flex;justify-content:center;gap:15px;margin-top:10px}</style></head><body><div id="app"><header><div onclick="toggleMenu()" style="cursor:pointer;font-size:1.3rem"><i class="fas fa-bars"></i></div><div class="header-icons"><i class="fas fa-search"></i><i class="fas fa-paint-roller"></i><i class="fas fa-bell"></i><i class="fas fa-user-circle" style="font-size:1.8rem"></i></div></header><div class="tabs-outer"><div class="tabs-nav" id="tabs-list"></div></div><div id="main-content"></div><div id="menu-overlay"><div class="menu-btn-close" onclick="toggleMenu()"><i class="fas fa-times" style="color:white;font-size:1.5rem"></i></div><div class="menu-item" onclick="toggleSub('sub-tecnicos')"><i class="fas fa-motorcycle"></i> <span style="margin-left:10px;flex:1">Técnicos</span><i class="fas fa-chevron-right"></i></div><div class="submenu" id="sub-tecnicos"><div class="submenu-item" onclick="openModule('tareas','Mis Tareas')">Mis Tareas</div><div class="submenu-item" onclick="openModule('agenda','Mi agenda')">Mi agenda</div></div></div></div><script>let openTabs=[];const date="14/07/2026";function toggleMenu(){document.getElementById('menu-overlay').classList.toggle('open');}function toggleSub(id){document.getElementById(id).classList.toggle('open');}function openModule(id,name){toggleMenu();if(!openTabs.find(t=>t.id===id))openTabs.push({id,name,active:true});activateTab(id);}function renderTabs(){const list=document.getElementById('tabs-list');list.innerHTML=openTabs.map(t=>`<div class="tab ${t.active?'active-tab':''}" onclick="activateTab('${t.id}')"><i class="${t.id==='agenda'?'fas fa-calendar-alt':'fas fa-walking'}"></i> ${t.name} <i class="fas fa-times" onclick="event.stopPropagation();closeTab('${t.id}')"></i></div>`).join('');}function activateTab(id){openTabs.forEach(t=>t.active=(t.id===id));renderTabs();renderContent(id);}function closeTab(id){openTabs=openTabs.filter(t=>t.id!==id);if(openTabs.length>0)activateTab(openTabs[openTabs.length-1].id);else{document.getElementById('main-content').innerHTML='';renderTabs();}}function renderContent(id){let html=`<div class="title-bar"><span>${id==='agenda'?'MIS SERVICIOS ASIG...':'TAREAS'}</span><span>${date}</span></div>`;if(id==='agenda'){html+=`<button class="btn-recargar">Recargar</button><table class="agenda-table"><thead><tr><th style="width:10px"><i class="fas fa-thumbtack"></i></th><th>Descripcion Servicio <i class="fas fa-sort"></i><i class="fas fa-thumbtack"></i></th><th>Cliente <i class="fas fa-sort"></i><i class="fas fa-thumbtack"></i></th><th>Direccion <i class="fas fa-sort"></i><i class="fas fa-thumbtack"></i></th></tr></thead><tbody><tr><td></td><td onclick="editService(1)">SERVICIO CONTROL DE PLAGAS SEDE SMART FIT SANTA BÁRBARA - <a href="tel:3103712508" class="num-link">310 3712508</a></td><td>SMART FIT SANTA BÁRBARA</td><td>Carrera 17 #121 - 73 - Santa Bárbara, Bogotá - D.C.</td></tr><tr><td></td><td onclick="editService(2)">SERVICIO CONTROL DE PLAGAS SEDE SMART FIT SAN MARTIN - <a href="tel:3212617881" class="num-link">321 2617881</a></td><td>SMART FIT SAN MARTÍN</td><td>7 # 32-12, Piso 3 Locales 308 y 327 / Centro</td></tr><tr><td></td><td onclick="editService(3)">CONTROL DE PLAGAS FUMIGACION - CLAUDIA MOSQUERA <a href="tel:3023979097" class="num-link">302 3979097</a> - TECNICO JONATHAN</td><td>SMART FIT METRO MOSQUERA</td><td>Cra. 5 Este #5 - 90, Mosquera, Cundinamarca</td></tr></tbody></table><div class="pagination-footer">[1 a 8 de 8]<div class="page-btns"><i class="fas fa-step-backward" style="opacity:0.3"></i><i class="fas fa-chevron-left" style="opacity:0.3"></i><i class="fas fa-chevron-right" style="opacity:0.3"></i><i class="fas fa-step-forward" style="opacity:0.3"></i></div></div>`;}else if(id==='edit-srv'){html+=`<div style="padding:20px;background:white;margin:15px;border-radius:8px"><h3>Editar Servicio</h3><div style="margin-top:15px"><label style="font-weight:700">Descripción</label><textarea rows="5" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:6px">SERVICIO CONTROL DE PLAGAS...</textarea></div><button style="width:100%;background:var(--p);color:white;border:none;padding:12px;border-radius:25px;margin-top:20px;font-weight:700" onclick="activateTab('agenda')">GUARDAR</button></div>`;}document.getElementById('main-content').innerHTML=html;}function editService(id){if(!openTabs.find(t=>t.id==='edit-srv'))openTabs.push({id:'edit-srv',name:'Editar Srv'});activateTab('edit-srv');}openModule('agenda', 'Mi agenda');</script></body></html>
