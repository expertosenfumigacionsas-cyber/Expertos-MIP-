<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#1abc9c;--d:#0d1124}*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}body{background:#f4f7f6}#ls{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--d);display:flex;align-items:center;justify-content:center;z-index:10000}.card-login{background:white;padding:40px 20px;border-radius:30px;width:95%;max-width:400px;text-align:center}.logo-f{position:relative;width:280px;height:180px;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}.cross{width:140px;height:140px;border:6px solid var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--d);position:relative}.cross::before{content:'';position:absolute;width:6px;height:30px;background:var(--p);top:-20px}.cross i.fa-mouse{color:white;font-size:3.5rem}.banner{background:var(--d);width:300px;padding:15px 5px;border-radius:15px 15px 5px 5px;text-align:center;color:var(--p);margin-top:-30px;z-index:10}.banner h1{font-size:2.2rem;font-weight:900;margin:0}.banner p{font-size:0.5rem;color:white;margin-top:5px}#app{display:none;padding-bottom:80px}header{background:var(--d);color:var(--p);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--p)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:20px}.item{background:white;padding:25px 15px;border-radius:20px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.05);cursor:pointer}.item i{font-size:2.5rem;margin-bottom:10px;display:block;color:var(--d)}nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:15px;border-top:1px solid #eee}nav button{border:none;background:none;color:#ccc;font-size:1.6rem}nav button.active{color:var(--p)}</style></head><body><div id="ls"><div class="card-login"><div class="logo-f"><div class="cross"><i class="fas fa-mouse"></i></div><div class="banner"><h1>EXPERTOS</h1><p>FUMIGACIONES - CONTROL DE PLAGAS - LAVADO DE TANQUES</p></div></div><input type="text" id="un" placeholder="👤 Usuario" style="width:100%;padding:15px;margin-bottom:20px;border:2px solid #eee;border-radius:12px;text-align:center"><button style="width:100%;height:60px;background:var(--d);color:var(--p);border:none;border-radius:12px;font-weight:bold;margin-bottom:10px" onclick="login('admin')">DUEÑO</button><button style="width:100%;height:60px;background:var(--p);color:var(--d);border:none;border-radius:12px;font-weight:bold" onclick="login('tech')">TÉCNICO</button></div></div><div id="app"><header><div style="font-weight:900">EXPERTOS MIP</div><span id="rt" style="background:var(--p);color:var(--d);padding:4px 10px;border-radius:10px;font-size:0.7rem;font-weight:bold"></span></header><div id="v-home" class="view active" style="padding:20px"><h3>Panel</h3><div class="grid" id="mm"></div></div><nav><button onclick="go('v-home')" id="nh" class="active"><i class="fas fa-home"></i></button><button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></nav></div><script>function login(r){const u=document.getElementById('un').value||'Experto';localStorage.setItem('mip_f',JSON.stringify({n:u,r:r}));render();}function render(){const s=localStorage.getItem('mip_f');if(!s)return;const u=JSON.parse(s);document.getElementById('ls').style.display='none';document.getElementById('app').style.display='block';document.getElementById('rt').innerText=u.n+' | '+u.r.toUpperCase();const m=[{n:'Servicio',i:'fa-crosshairs'},{n:'Clientes',i:'fa-users'},{n:'Agenda',i:'fa-calendar'},{n:'Insumos',i:'fa-pills'}];const g=document.getElementById('mm');g.innerHTML='';m.forEach(i=>{const d=document.createElement('div');d.className='item';d.innerHTML=`<i class="fas ${i.i}"></i><b>${i.n}</b>`;d.onclick=()=>alert('Abriendo '+i.n);g.appendChild(d);});}function go(id){document.getElementById('nh').classList.add('active');}function logout(){localStorage.clear();location.reload()}window.onload=render;</script></body></html>
