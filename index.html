<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP - Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--primary:#0d0e2b;--secondary:#5c6bc0;--accent:#c0392b;--bg:#f8f9fa;--text:#2c3e50;--white:#ffffff;--success:#27ae60;--gray:#e9ecef}*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}body{background:var(--bg);color:var(--text);min-height:100vh}.login-container{max-width:400px;margin:100px auto;padding:30px;background:var(--white);border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);text-align:center}.login-input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:6px;font-size:1rem}.login-btn{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:6px;font-size:1rem;font-weight:bold;cursor:pointer}.app-shell{display:none}header{background:var(--primary);color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}.main-nav{background:white;display:flex;overflow-x:auto;padding:10px;border-bottom:1px solid #eee;gap:10px}.nav-item{padding:8px 18px;background:#f0f2f5;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:0.3s}.nav-item.active{background:var(--secondary);color:white}.content{padding:15px}.section-title{font-size:1.1rem;font-weight:700;margin-bottom:15px;color:var(--primary);display:flex;align-items:center;gap:10px}.card{background:white;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:5px solid var(--secondary)}.service-grid{display:grid;grid-template-columns:1fr;gap:12px}.service-item{background:white;padding:15px;border-radius:8px;border:1px solid #eee;display:flex;justify-content:space-between;align-items:center}.btn-view{padding:6px 12px;background:var(--bg);border:1px solid #ddd;border-radius:4px;font-size:0.75rem;font-weight:bold;cursor:pointer}.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;z-index:2000;padding:20px;overflow-y:auto}.modal-content{background:white;padding:25px;border-radius:12px;max-width:600px;margin:auto;position:relative}.close-modal{position:absolute;top:15px;right:15px;font-size:1.5rem;cursor:pointer}.ft-table{width:100%;border-collapse:collapse;margin-top:15px;font-size:0.85rem}.ft-table td{padding:10px;border:1px solid #eee}.ft-label{background:#f9f9f9;font-weight:700;width:35%}</style></head><body><div id="login-screen" class="login-container"><h1>Expertos MIP</h1><p>Plataforma de Gestión Técnica</p><input type="text" class="login-input" placeholder="Usuario" id="user"><input type="password" class="login-input" placeholder="Contraseña" id="pass"><button class="login-btn" onclick="login()">Ingresar</button></div><div id="app-screen" class="app-shell"><header><div><i class="fas fa-shield-virus"></i> Expertos MIP</div><div id="user-display" style="font-size:0.8rem"></div></header><nav class="main-nav"><div class="nav-item active" onclick="showV('servicios')"><i class="fas fa-hand-holding-heart"></i> Servicios</div><div class="nav-item" onclick="showV('fichas')"><i class="fas fa-file-medical"></i> Fichas Técnicas</div><div class="nav-item" onclick="showV('agenda')"><i class="fas fa-calendar-check"></i> Agenda</div></nav><div id="app-content" class="content"></div></div><div id="modal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeM()">&times;</span><div id="modal-body"></div></div></div><script>function login(){const u=document.getElementById('user').value;if(u){document.getElementById('login-screen').style.display='none';document.getElementById('app-screen').style.display='block';document.getElementById('user-display').innerHTML='<i class="fas fa-user-tie"></i> '+u;showV('servicios');}}function showV(v){const c=document.getElementById('app-content');document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));event.currentTarget.classList.add('active');if(v==='servicios'){c.innerHTML=`<div class="section-title"><i class="fas fa-concierge-bell"></i> Portafolio de Servicios</div><div class="service-grid"><div class="card"><h4>Control de Plagas (MIP)</h4><p style="font-size:0.8rem;color:#666">Manejo Integrado de Plagas con enfoque preventivo y correctivo.</p></div><div class="card" style="border-left-color:var(--success)"><h4>Lavado de Tanques</h4><p style="font-size:0.8rem;color:#666">Desinfección y limpieza de tanques de agua potable según norma.</p></div><div class="card" style="border-left-color:var(--accent)"><h4>Desinfección de Áreas</h4><p style="font-size:0.8rem;color:#666">Eliminación de patógenos en superficies críticas.</p></div></div>`;}else if(v==='fichas'){c.innerHTML=`<div class="section-title"><i class="fas fa-book"></i> Fichas Técnicas de Productos</div><div class="service-grid"><div class="service-item"><span><i class="fas fa-flask"></i> Delta-MIP 2.5</span><button class="btn-view" onclick="openFT('Delta-MIP 2.5','Deltametrina','Insecticida de contacto y estomago','2ml/Litro')">Ver Ficha</button></div><div class="service-item"><span><i class="fas fa-virus-slash"></i> Amonio Cuaternario 5G</span><button class="btn-view" onclick="openFT('Amonio Cuaternario','Sales de Amonio','Desinfectante virucida','10ml/Litro')">Ver Ficha</button></div><div class="service-item"><span><i class="fas fa-skull"></i> Bloque Rodenticida</span><button class="btn-view" onclick="openFT('Rodent-Block','Brodifacouma','Anticoagulante de dosis única','Cebo directo')">Ver Ficha</button></div></div>`;}else if(v==='agenda'){c.innerHTML=`<div class="card"><h3>Próximo Servicio</h3><p><b>Cliente:</b> Sporty City SAS</p><p><b>Sede:</b> Smart Fit Santa Bárbara</p><button class="login-btn" style="margin-top:10px;padding:8px">Iniciar Gestión</button></div>`;}}function openFT(n,i,u,d){document.getElementById('modal').style.display='block';document.getElementById('modal-body').innerHTML=`<h3 style="color:var(--primary)">Ficha Técnica: ${n}</h3><table class="ft-table"><tr><td class="ft-label">Ingrediente Activo</td><td>${i}</td></tr><tr><td class="ft-label">Uso Principal</td><td>${u}</td></tr><tr><td class="ft-label">Dosificación</td><td>${d}</td></tr><tr><td class="ft-label">Registro Sanitario</td><td>RG-COL-2026-X11</td></tr><tr><td class="ft-label">Categoría Tox.</td><td>III - Ligeramente Tóxico</td></tr></table><button class="login-btn" style="margin-top:20px" onclick="closeM()">Cerrar Documento</button>`;}function closeM(){document.getElementById('modal').style.display='none';}</script></body></html>
