<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>
:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--card:#ffffff;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}
body{background:var(--bg);color:var(--txt);min-height:100vh}

/* HEADER & NAVBAR (Estilo Referencia) */
header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white}
.header-icons{display:flex;gap:20px;align-items:center}
.sub-nav{background:var(--s);padding:10px 20px;display:flex;align-items:center;color:white}

/* TABS (Estilo Referencia) */
.tabs-container{display:flex;background:#dcdde1;padding-top:10px}
.tab{background:var(--tab-bg);padding:10px 20px;border-radius:10px 10px 0 0;margin-left:5px;display:flex;align-items:center;gap:10px;font-size:0.85rem;color:var(--d);font-weight:600}
.tab.active-tab{background:var(--accent);color:white}
.tab i.close-tab{font-size:0.7rem;opacity:0.7}

/* BREADCRUMB / TITLE BAR */
.title-bar{background:#5c6bc0;color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;font-weight:700;text-transform:uppercase}

/* CONTENT */
.content-area{padding:20px}
.action-btn{background:#5c6bc0;color:white;border:none;padding:10px 20px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;font-size:0.9rem}

/* FORMULARIO (Estilo Referencia) */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:0.9rem;margin-bottom:8px;font-weight:600}
.form-group label span{color:red}
input[type="text"]{width:100%;padding:12px;border:1px solid #ccd1d9;border-radius:6px;background:white}

/* EDITOR DE TEXTO (Simulado según imagen) */
.text-editor{border:1px solid #ccd1d9;border-radius:6px;background:white;overflow:hidden}
.editor-toolbar{background:#f8f9fb;padding:10px;border-bottom:1px solid #ccd1d9;display:flex;gap:15px;align-items:center;flex-wrap:wrap}
.editor-toolbar select{padding:5px;border:1px solid #ddd;border-radius:4px}
.editor-toolbar i{color:#555;cursor:pointer}
.editor-body{padding:15px;min-height:250px;outline:none}

/* SIDE MENU */
#menu-overlay{position:fixed;top:0;left:-100%;width:100%;height:100%;background:var(--header-bg);z-index:2000;transition:0.4s;padding:20px}
#menu-overlay.open{left:0}
.menu-item-row{padding:15px;color:white;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;display:flex;align-items:center;gap:10px}
</style></head><body>

<div id="app">
    <header>
        <div onclick="toggleMenu()" style="cursor:pointer;font-size:1.3rem"><i class="fas fa-bars"></i></div>
        <div class="header-icons"><i class="fas fa-search"></i><i class="fas fa-paint-roller"></i><i class="fas fa-bell"></i><i class="fas fa-user-circle" style="font-size:1.8rem"></i></div>
    </header>

    <div class="tabs-container">
        <div class="tab" style="background:transparent;color:var(--accent)"><i class="fas fa-home"></i></div>
        <div class="tab active-tab"><i class="fas fa-paper-plane"></i> Enviar notificación <i class="fas fa-times close-tab"></i></div>
    </div>

    <div class="title-bar">
        <span>ENVIAR NOTIFICACIÓN</span>
        <span>14/07/2026</span>
    </div>

    <div class="content-area">
        <button class="action-btn"><i class="fas fa-plus"></i> Enviar notificación</button>

        <div class="form-group">
            <label>Título <span>*</span></label>
            <input type="text" placeholder="">
        </div>

        <div class="form-group">
            <label>Mensaje <span>*</span></label>
            <div class="text-editor">
                <div class="editor-toolbar">
                    <i class="fas fa-undo"></i>
                    <i class="fas fa-redo"></i>
                    <select><option>Párrafo</option></select>
                    <i class="fas fa-bold"></i>
                    <i class="fas fa-italic"></i>
                    <i class="fas fa-align-left"></i>
                </div>
                <div class="editor-body" contenteditable="true"></div>
            </div>
        </div>
    </div>

    <div id="menu-overlay">
        <div style="background:var(--accent);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:20px" onclick="toggleMenu()"><i class="fas fa-times" style="color:white"></i></div>
        <div class="menu-item-row" onclick="location.reload()"><i class="fas fa-home"></i><span>Inicio</span></div>
        <div class="menu-item-row" onclick="toggleMenu()"><i class="fas fa-bell"></i><span>Notificaciones</span></div>
    </div>
</div>

<script>
function toggleMenu(){document.getElementById('menu-overlay').classList.toggle('open');}
</script></body></html>
