<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#27ae60;--s:#2980b9;--t:#f39c12;--d:#1a1a1a;--l:#f4f7f6}*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}body{background:var(--l);color:#333}#ls{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--d);display:flex;align-items:center;justify-content:center;z-index:9}#app{display:none}.card{background:white;padding:30px;border-radius:25px;width:90%;max-width:380px;text-align:center}.logo-main{font-size:4rem;color:var(--p);margin-bottom:15px}.btn{width:100%;height:70px;border:none;border-radius:15px;font-size:1.1rem;font-weight:bold;color:white;margin-bottom:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}header{background:var(--p);color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:20px}.item{background:white;padding:20px;border-radius:20px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.05)}.item i{font-size:2rem;margin-bottom:10px;display:block}.disabled{opacity:0.4;filter:grayscale(1);pointer-events:none}nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:15px;border-top:1px solid #eee}</style></head><body><div id="ls"><div class="card"><div class="logo-main"><i class="fas fa-shield-virus"></i></div><h2 style="margin-bottom:5px">EXPERTOS MIP</h2><p style="margin-bottom:25px;color:#777;font-size:0.9rem">Control Profesional de Plagas</p><button class="btn" style="background:var(--p)" onclick="login('admin')"><i class="fas fa-user-tie"></i> DUEÑO</button><button class="btn" style="background:var(--s)" onclick="login('prog')"><i class="fas fa-code"></i> PROG</button><button class="btn" style="background:var(--t)" onclick="login('tech')"><i class="fas fa-briefcase"></i> TÉCNICO</button></div></div><div id="app"><header><div><i class="fas fa-shield-virus"></i> <span style="font-weight:bold">EXPERTOS MIP</span></div><span id="role" style="background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:15px;font-size:0.8rem">Rol</span></header><div class="grid" id="grid"></div><nav><button onclick="location.reload()" style="color:var(--p)"><i class="fas fa-home"></i></button><button onclick="alert('Próximamente')"><i class="fas fa-clipboard-list"></i></button><button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></nav></div><script>function login(r){const u={admin:{n:'Dueño',r:'admin',c:'#27ae60'},prog:{n:'Prog',r:'admin',c:'#2980b9'},tech:{n:'Técnico',r:'tecnico',c:'#f39c12'}};localStorage.setItem('mip_session',JSON.stringify(u[r]));render();}function render(){const s=localStorage.getItem('mip_session');if(!s)return;const u=JSON.parse(s);document.getElementById('ls').style.display='none';document.getElementById('app').style.display='block';document.getElementById('role').innerText=u.n;document.getElementById('role').style.background=u.c;const g=document.getElementById('grid');g.innerHTML='';const m=[{n:'Servicios',i:'fa-file-signature',r:['admin','tecnico']},{n:'Clientes',i:'fa-users',r:['admin']},{n:'Inventario',i:'fa-boxes',r:['admin','tecnico']},{n:'Agenda',i:'fa-calendar-alt',r:['admin','tecnico']},{n:'Certificados',i:'fa-award',r:['admin']},{n:'Configuración',i:'fa-sliders-h',r:['admin']}];m.forEach(t=>{const a=t.r.includes(u.r);g.innerHTML+=`<div class="item ${a?'':'disabled'}" onclick="alert('Abriendo '+t.n)"><i class="fas ${t.i}" style="color:${a?u.c:'#ccc'}"></i><span style="font-size:0.8rem;font-weight:bold">${t.n}</span></div>`;});}function logout(){localStorage.clear();location.reload();}window.onload=render;</script></body></html>
