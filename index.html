<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expertos MIP - Sistema Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #27ae60; --s: #2980b9; --t: #f39c12; --dark: #1a1a1a; --light: #f4f7f6; --text: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--light); color: var(--text); }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--dark); }
        .card { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; }
        .btn-access { width: 100%; height: 70px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; color: white; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* MAIN APP */
        #main-app { display: none; }
        header { background: var(--p); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .role-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        
        /* DASHBOARD GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-item { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .menu-item i { font-size: 2rem; color: var(--p); margin-bottom: 10px; }
        .menu-item.disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        
        /* VIEWS */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* FOOTER NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; }
        nav button { border: none; background: none; color: #999; font-size: 1.4rem; cursor: pointer; }
        nav button.active { color: var(--p); }

        .admin-only { border: 2px solid var(--p); }
        .tech-only { border: 2px solid var(--t); }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO -->
    <div id="login-screen">
        <div class="card">
            <h2 style="margin-bottom:20px;">Expertos MIP</h2>
            <button class="btn-access" style="background:var(--p)" onclick="login('admin')"><i class="fas fa-user-tie"></i> SOY EL DUEÑO</button>
            <button class="btn-access" style="background:var(--s)" onclick="login('prog')"><i class="fas fa-code"></i> PROGRAMADOR</button>
            <button class="btn-access" style="background:var(--t)" onclick="login('tech')"><i class="fas fa-briefcase"></i> SOY TÉCNICO</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-app">
        <header>
            <span id="header-user">Expertos MIP</span>
            <span class="role-badge" id="header-role">Rol</span>
        </header>

        <div id="v-home" class="view active">
            <div class="grid" id="main-grid">
                <!-- Los items se cargan por JS según el rol -->
            </div>
            
            <div id="tech-msg" style="display:none; padding: 0 20px; text-align:center; color:#666;">
                <p>Bienvenido. Aquí verás tus órdenes de trabajo asignadas.</p>
            </div>
        </div>

        <div id="v-admin" class="view">
            <h3>Panel de Administración</h3>
            <p>Control de nómina, precios y configuración avanzada.</p>
        </div>

        <nav>
            <button onclick="changeView('v-home')" id="n-home" class="active"><i class="fas fa-home"></i></button>
            <button onclick="changeView('v-serv')"><i class="fas fa-clipboard-check"></i></button>
            <button id="n-admin" onclick="changeView('v-admin')"><i class="fas fa-cog"></i></button>
            <button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
    </div>

    <script>
        let ME = null;

        function login(role) {
            ME = {
                admin: {nombre: 'Dueño', rol: 'admin', color: '#27ae60'},
                prog: {nombre: 'Programador', rol: 'admin', color: '#2980b9'},
                tech: {nombre: 'Técnico', rol: 'tecnico', color: '#f39c12'}
            }[role];
            
            localStorage.setItem('mip_session', JSON.stringify(ME));
            initApp();
        }

        function initApp() {
            ME = JSON.parse(localStorage.getItem('mip_session'));
            if(!ME) return;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('header-role').innerText = ME.nombre;
            document.getElementById('header-role').style.background = ME.color;

            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            // BOTONES SEGÚN PERMISOS
            const menu = [
                {id: 's', n: 'Servicios', i: 'fa-file-contract', r: ['admin', 'tecnico']},
                {id: 'c', n: 'Clientes', i: 'fa-users', r: ['admin']},
                {id: 'i', n: 'Inventario', i: 'fa-flask', r: ['admin', 'tecnico']},
                {id: 'r', n: 'Reportes PDF', i: 'fa-file-pdf', r: ['admin']},
                {id: 'a', n: 'Agenda', i: 'fa-calendar-alt', r: ['admin', 'tecnico']},
                {id: 'u', n: 'Usuarios', i: 'fa-user-cog', r: ['admin']}
            ];

            menu.forEach(item => {
                const hasAccess = item.r.includes(ME.rol);
                grid.innerHTML += `
                    <div class="menu-item ${hasAccess ? '' : 'disabled'}" onclick="${hasAccess ? "alert('Cargando "+item.n+"')" : "alert('Acceso denegado: Solo administradores')" }">
                        <i class="fas ${item.i}" style="color: ${hasAccess ? ME.color : '#ccc'}"></i>
                        <p style="font-size:0.9rem">${item.n}</p>
                    </div>
                `;
            });

            // Ocultar botón de configuración para técnicos
            if(ME.rol === 'tecnico') {
                document.getElementById('n-admin').style.display = 'none';
                document.getElementById('tech-msg').style.display = 'block';
            } else {
                document.getElementById('n-admin').style.display = 'block';
                document.getElementById('tech-msg').style.display = 'none';
            }
        }

        function changeView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function logout() {
            localStorage.removeItem('mip_session');
            location.reload();
        }

        window.onload = initApp;
    </script>
</body>
</html>
