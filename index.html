<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0f4c25"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Expertos MIP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g1:#0f4c25;--g2:#166534;--g3:#15803d;--g4:#16a34a;--g5:#22c55e;--g6:#bbf7d0;--g7:#f0fdf4;
  --slate:#0f172a;--slate2:#1e293b;--slate3:#334155;--slate4:#64748b;--slate5:#94a3b8;
  --slate6:#cbd5e1;--slate7:#e2e8f0;--slate8:#f1f5f9;--slate9:#f8fafc;
  --red:#dc2626;--red2:#fef2f2;--amber:#d97706;--amber2:#fffbeb;
  --blue:#2563eb;--blue2:#eff6ff;--purple:#7c3aed;--purple2:#f5f3ff;
  --white:#ffffff;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;--r-full:9999px;
  --sh1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh3:0 8px 24px rgba(0,0,0,.10),0 4px 8px rgba(0,0,0,.04);
  --sh4:0 20px 48px rgba(0,0,0,.14),0 8px 16px rgba(0,0,0,.06);
  --tr:.2s cubic-bezier(.4,0,.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
  background:var(--slate8);min-height:100vh;color:var(--slate);overscroll-behavior:none;}
img{max-width:100%;}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--slate6);border-radius:4px;}

/* ─── AUTH ─── */
#auth{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  background:linear-gradient(150deg,var(--g1) 0%,#1a7a40 50%,var(--g3) 100%);
  position:relative;overflow:hidden;
}
#auth::before{
  content:'';position:absolute;top:-30%;left:-20%;width:70%;height:70%;
  background:radial-gradient(circle,rgba(255,255,255,.07) 0%,transparent 70%);
  border-radius:50%;
}
#auth::after{
  content:'';position:absolute;bottom:-20%;right:-10%;width:60%;height:60%;
  background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 70%);
  border-radius:50%;
}
.auth-card{
  background:var(--white);border-radius:28px;padding:40px 32px;
  width:100%;max-width:380px;box-shadow:var(--sh4);
  position:relative;z-index:1;
  animation:slideUp .5s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo img{width:96px;height:96px;object-fit:cover;border-radius:22px;
  box-shadow:0 8px 32px rgba(15,76,37,.3);border:3px solid var(--g6);}
.auth-brand h2{font-size:1.35rem;font-weight:800;color:var(--slate);letter-spacing:-.3px;margin-top:14px;}
.auth-brand p{font-size:.8rem;color:var(--slate4);margin-top:3px;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:.75rem;font-weight:700;color:var(--slate3);
  margin-bottom:6px;letter-spacing:.2px;text-transform:uppercase;}
.auth-input{
  width:100%;padding:13px 16px;border:2px solid var(--slate7);
  border-radius:var(--r12);font-size:.95rem;color:var(--slate);
  background:var(--slate9);outline:none;transition:var(--tr);
  -webkit-appearance:none;
}
.auth-input:focus{border-color:var(--g4);background:var(--white);box-shadow:0 0 0 4px rgba(22,163,74,.1);}
.btn-login{
  width:100%;padding:15px;margin-top:8px;
  background:linear-gradient(135deg,var(--g2),var(--g4));
  color:var(--white);border:none;border-radius:var(--r12);
  font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.2px;
  box-shadow:0 4px 16px rgba(22,163,74,.35);
  transition:var(--tr);position:relative;overflow:hidden;
}
.btn-login::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
}
.btn-login:active{transform:scale(.98);}
.auth-err{
  margin-top:12px;padding:10px 14px;background:var(--red2);
  border-radius:var(--r8);font-size:.82rem;color:var(--red);
  text-align:center;display:none;font-weight:600;
}
.auth-err.show{display:block;}

/* ─── APP SHELL ─── */
#app{display:none;min-height:100vh;}

/* ─── TOPBAR ─── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  padding:env(safe-area-inset-top,0) 0 0;
  box-shadow:0 2px 16px rgba(0,0,0,.2);
}
.topbar-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 10px;gap:12px;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{width:38px;height:38px;object-fit:cover;border-radius:10px;
  border:2px solid rgba(255,255,255,.3);flex-shrink:0;}
.topbar-title h1{font-size:.95rem;font-weight:800;color:var(--white);letter-spacing:-.2px;}
.topbar-title p{font-size:.65rem;color:rgba(255,255,255,.65);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.chip-user{font-size:.72rem;font-weight:700;color:var(--white);
  background:rgba(255,255,255,.18);padding:3px 10px;border-radius:var(--r-full);
  border:1px solid rgba(255,255,255,.25);max-width:100px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.chip-rol{font-size:.6rem;color:rgba(255,255,255,.7);text-align:right;margin-top:2px;}
.btn-out{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:var(--white);border-radius:var(--r8);padding:6px 12px;
  font-size:.72rem;font-weight:600;cursor:pointer;transition:var(--tr);
  white-space:nowrap;
}
.btn-out:active{background:rgba(255,255,255,.25);}

/* ─── CONTENT ─── */
.content{padding:74px 0 80px;}
.sec{display:none;padding:14px;}
.sec.active{display:block;}

/* ─── SECTION HEADER ─── */
.sec-hdr{
  display:flex;align-items:center;gap:10px;
  background:var(--white);border-radius:var(--r16);
  padding:14px 16px;margin-bottom:14px;
  box-shadow:var(--sh1);border:1px solid var(--slate7);
}
.sec-hdr-icon{
  width:42px;height:42px;border-radius:var(--r12);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.sec-hdr h2{font-size:1.05rem;font-weight:800;color:var(--slate);letter-spacing:-.2px;}
.sec-hdr p{font-size:.75rem;color:var(--slate4);margin-top:1px;}

/* ─── SEARCH ─── */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{
  width:100%;padding:11px 16px 11px 40px;
  border:2px solid var(--slate7);border-radius:var(--r-full);
  font-size:.88rem;color:var(--slate);background:var(--white);
  outline:none;transition:var(--tr);
}
.search-wrap input:focus{border-color:var(--g4);box-shadow:0 0 0 4px rgba(22,163,74,.1);}
.search-wrap::before{
  content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:.85rem;pointer-events:none;
}

/* ─── STATS GRID ─── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{
  background:var(--white);border-radius:var(--r16);padding:16px;
  box-shadow:var(--sh1);border:1px solid var(--slate7);
  transition:var(--tr);position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--g3),var(--g5));
}
.stat-card.amber::before{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.stat-card.blue::before{background:linear-gradient(90deg,#3b82f6,#60a5fa);}
.stat-card.purple::before{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}
.stat-num{font-size:2rem;font-weight:900;color:var(--slate);letter-spacing:-1px;line-height:1;}
.stat-lbl{font-size:.72rem;color:var(--slate4);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.3px;}
.stat-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:2rem;opacity:.12;}

/* ─── CARDS ─── */
.card{
  background:var(--white);border-radius:var(--r16);padding:16px;
  box-shadow:var(--sh1);border:1px solid var(--slate7);
  margin-bottom:10px;
}
.card h3{font-size:.9rem;font-weight:700;color:var(--slate);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;}

/* ─── LIST ITEMS ─── */
.li{
  background:var(--white);border-radius:var(--r12);padding:14px;
  margin-bottom:8px;box-shadow:var(--sh1);border:1px solid var(--slate7);
  display:flex;align-items:center;gap:10px;
  transition:var(--tr);
}
.li:active{transform:scale(.99);}
.li.pend{border-left:3px solid var(--amber);}
.li.comp{border-left:3px solid var(--g4);}
.li.proc{border-left:3px solid var(--blue);}
.li-ava{
  width:44px;height:44px;border-radius:var(--r12);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.li-info h4{font-size:.88rem;font-weight:700;color:var(--slate);}
.li-info p{font-size:.74rem;color:var(--slate4);margin-top:2px;line-height:1.5;}
.li-acts{display:flex;gap:6px;flex-shrink:0;}

/* ─── BADGES ─── */
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:var(--r-full);
  font-size:.65rem;font-weight:700;letter-spacing:.2px;
  text-transform:uppercase;
}
.b-pend{background:#fef3c7;color:#92400e;}
.b-proc{background:#dbeafe;color:#1e40af;}
.b-comp{background:#dcfce7;color:#166534;}
.b-admin{background:#ede9fe;color:#5b21b6;}
.b-prog{background:#dbeafe;color:#1e40af;}
.b-tec{background:#dcfce7;color:#166534;}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;border-radius:var(--r8);font-size:.82rem;
  font-weight:600;cursor:pointer;border:none;transition:var(--tr);
  white-space:nowrap;
}
.btn:active{transform:scale(.97);}
.btn-g{background:linear-gradient(135deg,var(--g2),var(--g4));color:var(--white);
  box-shadow:0 2px 8px rgba(22,163,74,.3);}
.btn-o{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;}
.btn-r{background:var(--red2);color:var(--red);border:1px solid #fecaca;}
.btn-b{background:var(--blue2);color:var(--blue);border:1px solid #bfdbfe;}
.btn-gr{background:var(--slate8);color:var(--slate4);border:1px solid var(--slate7);}
.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--r8);}
.btn-sm{width:32px;height:32px;font-size:.8rem;}
.btn-block{width:100%;border-radius:var(--r12);padding:13px;font-size:.9rem;}

/* ─── FORM ─── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:.73rem;font-weight:700;color:var(--slate3);
  margin-bottom:6px;letter-spacing:.2px;text-transform:uppercase;}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border:2px solid var(--slate7);
  border-radius:var(--r12);font-size:.9rem;color:var(--slate);
  background:var(--slate9);outline:none;transition:var(--tr);
  -webkit-appearance:none;font-family:inherit;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--g4);background:var(--white);
  box-shadow:0 0 0 4px rgba(22,163,74,.08);
}
.field textarea{resize:vertical;min-height:80px;}

/* ─── MODAL / OVERLAY ─── */
.overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(15,23,42,.6);backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex;}
.modal{
  background:var(--white);border-radius:28px 28px 0 0;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  padding:20px 20px env(safe-area-inset-bottom,16px);
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
.modal-handle{
  width:40px;height:4px;background:var(--slate6);
  border-radius:2px;margin:0 auto 20px;
}
.modal-title{
  font-size:1.1rem;font-weight:800;color:var(--slate);
  margin-bottom:20px;padding-bottom:14px;
  border-bottom:2px solid var(--slate7);
  display:flex;align-items:center;gap:8px;
}
.modal-acts{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--slate7);}
.modal-acts .btn{flex:1;padding:13px;font-size:.88rem;}

/* ─── NAV ─── */
.nav{
  display:flex;background:var(--white);
  border-top:1px solid var(--slate7);
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  padding-bottom:env(safe-area-inset-bottom,0);
  box-shadow:0 -4px 24px rgba(0,0,0,.07);
}
.nb{
  flex:1;padding:10px 2px 8px;border:none;background:transparent;cursor:pointer;
  font-size:.58rem;color:var(--slate5);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:color var(--tr);position:relative;
  -webkit-appearance:none;
}
.nb-icon{
  font-size:1.4rem;transition:transform var(--tr);
  width:40px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r8);transition:var(--tr);
}
.nb.active{color:var(--g2);}
.nb.active .nb-icon{background:var(--g7);transform:scale(1.08);}
.nb.hidden{display:none;}

/* ─── FAB ─── */
.fab{
  position:fixed;bottom:80px;right:16px;
  width:56px;height:56px;
  background:linear-gradient(135deg,var(--g2),var(--g4));
  color:var(--white);border:none;border-radius:var(--r-full);
  font-size:1.7rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(22,163,74,.45);
  z-index:290;display:none;
  align-items:center;justify-content:center;
  transition:var(--tr);
}
.fab:active{transform:scale(.92);}

/* ─── FOTO SLOTS ─── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.foto-slot{
  aspect-ratio:1;border-radius:var(--r12);overflow:hidden;
  border:2px dashed var(--slate6);background:var(--slate9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--tr);position:relative;
}
.foto-slot:active{border-color:var(--g4);background:var(--g7);}
.foto-slot img{width:100%;height:100%;object-fit:cover;}
.foto-slot-lbl{font-size:.65rem;color:var(--slate4);margin-top:4px;font-weight:600;text-align:center;padding:0 4px;}
.foto-add{font-size:1.5rem;}
.foto-slot.filled{border-style:solid;border-color:var(--g5);}
.foto-del{
  position:absolute;top:4px;right:4px;
  background:rgba(220,38,38,.85);color:var(--white);
  border:none;border-radius:var(--r-full);width:22px;height:22px;
  font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* ─── FIRMA ─── */
.firma-wrap{
  border:2px solid var(--slate6);border-radius:var(--r12);
  overflow:hidden;background:var(--white);margin-bottom:8px;
}
#firma-canvas{display:block;width:100%;touch-action:none;cursor:crosshair;}
.firma-ok{
  display:flex;align-items:center;gap:6px;padding:8px 12px;
  background:var(--g7);border-radius:var(--r8);margin-bottom:8px;
  font-size:.78rem;color:var(--g2);font-weight:600;
}

/* ─── DETALLE SERVICIO ─── */
.det-hero{
  background:linear-gradient(135deg,var(--g1),var(--g3));
  border-radius:var(--r16);padding:20px;margin-bottom:12px;
  color:var(--white);position:relative;overflow:hidden;
}
.det-hero::after{
  content:'🦟';position:absolute;right:16px;bottom:-4px;
  font-size:4rem;opacity:.12;
}
.det-hero h2{font-size:1.2rem;font-weight:800;letter-spacing:-.3px;}
.det-hero p{font-size:.8rem;opacity:.8;margin-top:4px;}
.det-status{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.2);border-radius:var(--r-full);
  padding:3px 10px;font-size:.72rem;font-weight:700;
  margin-top:8px;
}
.det-section{background:var(--white);border-radius:var(--r12);padding:14px;margin-bottom:10px;
  border:1px solid var(--slate7);}
.det-section h3{font-size:.8rem;font-weight:800;color:var(--slate4);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.det-row{display:flex;justify-content:space-between;gap:12px;
  padding:7px 0;border-bottom:1px solid var(--slate8);}
.det-row:last-child{border-bottom:none;padding-bottom:0;}
.det-key{font-size:.78rem;color:var(--slate4);font-weight:600;flex-shrink:0;}
.det-val{font-size:.82rem;color:var(--slate);font-weight:600;text-align:right;}
.fotos-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.fotos-row img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--r8);cursor:pointer;}

/* ─── CERTIFICADO ─── */
.cert-wrap{
  background:var(--white);border-radius:var(--r16);
  border:2px solid var(--g6);overflow:hidden;margin-bottom:12px;
}
.cert-header{
  background:linear-gradient(135deg,var(--g1),var(--g2));
  padding:18px 16px;display:flex;align-items:center;gap:12px;
}
.cert-header img{width:52px;height:52px;object-fit:cover;border-radius:12px;
  border:2px solid rgba(255,255,255,.4);}
.cert-header h3{font-size:.95rem;font-weight:800;color:var(--white);}
.cert-header p{font-size:.7rem;color:rgba(255,255,255,.75);margin-top:2px;}
.cert-body{padding:16px;}
.cert-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.cert-lbl{display:block;font-size:.65rem;color:var(--slate4);font-weight:700;
  text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.cert-val{font-size:.82rem;font-weight:700;color:var(--slate);}
.cert-ok{
  background:var(--g7);border-radius:var(--r8);padding:10px 14px;
  font-size:.8rem;color:var(--g2);font-weight:700;
  display:flex;align-items:center;gap:6px;margin-top:12px;
  border:1px solid var(--g6);
}

/* ─── AGENDA ─── */
.ag-date-hdr{
  font-size:.7rem;font-weight:800;color:var(--slate4);
  text-transform:uppercase;letter-spacing:.5px;
  padding:8px 0 4px;
}
.ag-item{
  background:var(--white);border-radius:var(--r12);
  padding:12px;margin-bottom:8px;
  border:1px solid var(--slate7);box-shadow:var(--sh1);
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:var(--tr);
}
.ag-item:active{transform:scale(.99);}
.ag-time{
  background:var(--amber2);border-radius:var(--r8);
  padding:8px 10px;min-width:52px;text-align:center;
  font-size:.85rem;font-weight:900;color:#92400e;flex-shrink:0;
}

/* ─── DATOS (BACKUP) ─── */
.backup-card{
  background:var(--white);border-radius:var(--r16);
  padding:20px;margin-bottom:10px;border:1px solid var(--slate7);
  box-shadow:var(--sh1);
}
.backup-card h3{font-size:.9rem;font-weight:800;color:var(--slate);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.backup-card p{font-size:.8rem;color:var(--slate4);line-height:1.6;margin-bottom:12px;}
.info-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 0;border-bottom:1px solid var(--slate8);
  font-size:.8rem;
}
.info-row:last-child{border-bottom:none;}
.info-row .ico{flex-shrink:0;font-size:1rem;}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--slate2);color:var(--white);
  padding:10px 20px;border-radius:var(--r-full);
  font-size:.82rem;font-weight:600;
  z-index:9999;opacity:0;transition:var(--tr);

<script>
// --- CORE DATA & STORAGE ---
const DB = {
  get: (k) => JSON.parse(localStorage.getItem('mip_' + k)),
  set: (k, v) => localStorage.setItem('mip_' + k, JSON.stringify(v))
};

let U = [], CL = [], SV = [], ME = null;

// --- INITIALIZATION ---
function initApp() {
    console.log("Iniciando App v36...");
    U = DB.get('usuarios') || [];
    CL = DB.get('clientes') || [];
    SV = DB.get('servicios') || [];
    
    // Asegurar que el admin maestro SIEMPRE exista en la memoria
    if (!U.find(u => u.id === 1)) {
        U.push({id:1, nombre:'Administrador', user:'administrador', pass:'1234567', rol:'admin'});
        DB.set('usuarios', U);
    }
    
    checkSession();
}

function checkSession() {
    const session = localStorage.getItem('mip_session');
    if (session) {
        ME = JSON.parse(session);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        if(typeof renderHome === 'function') renderHome();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('main-app').style.display = 'none';
    }
}

// --- LOGIN LOGIC ---
function doLogin() {
    const uInput = document.getElementById('lu').value.trim().toLowerCase();
    const pInput = document.getElementById('lp').value.trim();
    const err = document.getElementById('lerr');

    console.log("Intento login:", uInput, pInput);

    let found = null;

    // 1. Hardcoded override (Inmune a fallos de base de datos)
    if (uInput === 'app' && pInput === '123') {
        found = {id:99, nombre:'Programador', user:'app', pass:'123', rol:'admin'};
    } else if (uInput === 'administrador' && pInput === '1234567') {
        found = {id:1, nombre:'Administrador', user:'administrador', pass:'1234567', rol:'admin'};
    } else {
        // 2. Buscar en la lista de usuarios
        found = U.find(x => x.user.toLowerCase() === uInput && x.pass === pInput);
    }

    if (found) {
        console.log("Login exitoso!");
        localStorage.setItem('mip_session', JSON.stringify(found));
        checkSession();
        window.location.reload(); // Recarga limpia
    } else {
        console.error("Login fallido");
        err.style.display = 'block';
        alert("Error de ingreso.
Usuario: " + uInput + "
Clave: " + pInput + "

Por favor verifica que no haya mayúsculas accidentales.");
    }
}

function logout() {
    localStorage.removeItem('mip_session');
    window.location.reload();
}

// Ejecutar al cargar
window.onload = initApp;
</script>
