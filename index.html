<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Expertos MIP</title><style>:root{--p:#27ae60;--s:#2980b9;--bg:#1a1a1a}body{margin:0;font-family:sans-serif;background:var(--bg);color:white;display:flex;justify-content:center;align-items:center;height:100vh}.card{background:white;padding:40px 20px;border-radius:30px;width:90%;max-width:350px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.5)}h2{color:#2c3e50;margin-bottom:30px}.btn{width:100%;height:80px;border:none;border-radius:20px;font-size:1.4rem;font-weight:bold;margin-bottom:20px;cursor:pointer;color:white;transition:0.2s}.btn:active{transform:scale(0.95)}.dueño{background:var(--p)}.prog{background:var(--s)}</style></head><body><div class="card"><h2>Expertos MIP</h2><button class="btn dueño" onclick="entrar('admin')">🟢 SOY EL DUEÑO</button><button class="btn prog" onclick="entrar('prog')">🔵 PROGRAMADOR</button></div><script>function entrar(t){const s={id:1,rol:'admin',nombre:t==='admin'?'Dueño':'Prog'};localStorage.setItem('mip_session',JSON.stringify(s));alert('Ingresando...');location.href='index.html';}</script></body></html>
