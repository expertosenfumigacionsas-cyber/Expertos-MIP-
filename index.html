<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP - Plataforma Profesional</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--primary:#0d0e2b;--secondary:#5c6bc0;--accent:#c0392b;--bg:#f8f9fa;--text:#2c3e50;--white:#ffffff;--success:#27ae60}*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}body{background:var(--bg);color:var(--text);min-height:100vh}.login-container{max-width:400px;margin:100px auto;padding:30px;background:var(--white);border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);text-align:center}.login-container h1{color:var(--primary);margin-bottom:10px;font-size:1.8rem}.login-container p{color:#7f8c8d;margin-bottom:25px}.login-input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:6px;font-size:1rem}.login-btn{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:6px;font-size:1rem;font-weight:bold;cursor:pointer}.app-shell{display:none}header{background:var(--primary);color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}.main-nav{background:white;display:flex;overflow-x:auto;padding:10px;border-bottom:1px solid #eee;gap:10px}.nav-item{padding:8px 15px;background:#f0f2f5;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px}.nav-item.active{background:var(--secondary);color:white}.content{padding:15px}.card{background:white;border-radius:8px;padding:15px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.05);border-left:4px solid var(--secondary)}.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}.product-card{background:white;border-radius:8px;padding:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.05);border:1px solid #eee}.product-card img{width:100%;height:100px;object-fit:contain;margin-bottom:10px}.product-name{font-weight:bold;font-size:0.85rem;margin-bottom:5px}.product-desc{font-size:0.7rem;color:#7f8c8d}.cert-view{background:white;padding:20px;border:1px solid #ddd;font-family:Arial, sans-serif}</style></head><body><div id="login-screen" class="login-container"><h1>Expertos MIP</h1><p>Control de Plagas y Fumigación</p><input type="text" class="login-input" placeholder="Usuario" id="user"><input type="password" class="login-input" placeholder="Contraseña" id="pass"><button class="login-btn" onclick="login()">Ingresar</button></div><div id="app-screen" class="app-shell"><header><div><i class="fas fa-bars"></i> Expertos MIP</div><div id="user-display" style="font-size:0.8rem"></div></header><nav class="main-nav"><div class="nav-item active" onclick="showView('agenda')"><i class="fas fa-calendar-alt"></i> Agenda</div><div class="nav-item" onclick="showView('productos')"><i class="fas fa-flask"></i> Insumos</div><div class="nav-item" onclick="showView('tareas')"><i class="fas fa-clipboard-list"></i> Tareas</div></nav><div id="app-content" class="content"></div></div><script>function login(){const u=document.getElementById('user').value;if(u){document.getElementById('login-screen').style.display='none';document.getElementById('app-screen').style.display='block';document.getElementById('user-display').innerHTML='<i class="fas fa-user"></i> '+u;showView('agenda');}}function showView(view){const content=document.getElementById('app-content');document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));if(view==='agenda'){content.innerHTML=`<div class="card"><h3>Próximo Servicio</h3><p><b>Cliente:</b> Smart Fit Santa Bárbara</p><p><b>Servicio:</b> Control de Plagas</p><button class="login-btn" style="margin-top:10px;padding:8px" onclick="showView('detalle')">Gestionar</button></div>`;}else if(view==='productos'){content.innerHTML=`<div class="product-grid"><div class="product-card"><i class="fas fa-bug fa-2x" style="color:#5c6bc0"></i><div class="product-name">Insecticida Delta</div><div class="product-desc">Control de rastreros de amplio espectro.</div></div><div class="product-card"><i class="fas fa-mouse fa-2x" style="color:#c0392b"></i><div class="product-name">Rodenticida Bloque</div><div class="product-desc">Cebo de alta palatabilidad para roedores.</div></div><div class="product-card"><i class="fas fa-spray-can fa-2x" style="color:#27ae60"></i><div class="product-name">Gel para Cucarachas</div><div class="product-desc">Aplicación focalizada en puntos críticos.</div></div><div class="product-card"><i class="fas fa-shield-alt fa-2x" style="color:#f39c12"></i><div class="product-name">Desinfectante Amonio</div><div class="product-desc">Eliminación de virus y bacterias.</div></div></div>`;}else if(view==='detalle'){content.innerHTML=`<div class="card"><h3>Gestión de Orden</h3><label style="font-size:0.8rem">Método de aplicación:</label><select class="login-input"><option>Aspersión</option><option>Nebulización</option></select><div style="border:1px solid #ddd;height:120px;margin-bottom:10px;background:#fcfcfc;position:relative"><span style="position:absolute;bottom:30px;left:20%;width:60%;border-bottom:1px solid #999"></span><p style="font-size:0.6rem;text-align:center;margin-top:80px">Firma del Cliente</p></div><button class="login-btn">Finalizar y Firmar</button></div>`;}}</script></body></html>
