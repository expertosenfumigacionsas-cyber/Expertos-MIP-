<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--blue-light:#7d89ff;--exp-red:#c0392b}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:1000}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0;overflow-x:auto;position:sticky;top:60px;z-index:900}.tabs-nav{display:flex;flex:1}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px;border:1px solid #ccc;border-bottom:none}.tab.active-tab{background:var(--accent);color:white;border-color:var(--accent)}#menu-sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--header-bg);z-index:2000;transition:0.3s;padding:20px;color:white}#menu-sidebar.open{left:0}.menu-close{background:var(--accent);width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:30px;cursor:pointer}.menu-item{padding:15px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;display:flex;justify-content:space-between;align-items:center}.submenu{padding-left:30px;display:none;background:rgba(0,0,0,0.2)}.submenu.open{display:block}.submenu-item{padding:12px 0;color:rgba(255,255,255,0.7);font-size:0.9rem;cursor:pointer}.title-bar{background:var(--blue-light);color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;font-weight:700}.action-bar{background:white;padding:10px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid #ddd}.btn-action{background:#f0f2f5;border:1px solid #d1d5db;padding:8px 15px;border-radius:4px;font-size:0.8rem;color:#333;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer}.btn-action.active{background:var(--accent);color:white}.content-area{padding:10px}table{width:100%;border-collapse:collapse;background:white;font-size:0.8rem}th{background:var(--table-header);color:white;padding:10px;text-align:left}td{padding:12px 10px;border-bottom:1px solid #eee}.sig-box{border:1px solid #ddd;height:150px;background:#fcfcfc;margin:10px 0;position:relative}.sig-line{position:absolute;bottom:40px;left:10%;width:80%;height:1px;background:#ccc}.form-group{margin-bottom:15px}.form-group label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:5px;color:#555}.form-group input, .form-group select, .form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px}.cert-paper{background:white;padding:25px;border:1px solid #ddd;max-width:850px;margin:auto;font-family:Arial, sans-serif;box-shadow: 0 4px 10px rgba(0,0,0,0.1)}.cert-head{display:flex;justify-content:space-between;border-bottom:3px solid var(--exp-red);padding-bottom:15px;margin-bottom:20px}.cert-logo-txt{color:var(--exp-red);font-weight:900;font-size:1.6rem}.cert-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;font-size:0.85rem}.cert-info-item{border:1px solid #eee;padding:10px;background:#f9f9f9}.cert-info-item b{color:#555;display:block;font-size:0.75rem;margin-bottom:3px}</style></head><body><header><div onclick="toggleMenu()" style="cursor:pointer"><i class="fas fa-bars fa-lg"></i></div><div style="font-weight:800;font-size:1.2rem">Expertos MIP</div><div style="display:flex;gap:15px"><i class="fas fa-bell"></i><i class="fas fa-user-circle fa-lg"></i></div></header><div id="menu-sidebar"><div class="menu-close" onclick="toggleMenu()"><i class="fas fa-times"></i></div><div style="padding:10px;background:rgba(255,255,255,0.1);margin-bottom:20px;border-radius:8px;font-size:0.8rem"><b>Experto:</b> Jesús Antonio Marín<br><b>NIT:</b> 901.417.316</div><div class="menu-item" onclick="toggleSub('sub-tecnicos')"><span><i class="fas fa-motorcycle"></i> Técnicos</span><i class="fas fa-chevron-down"></i></div><div class="submenu open" id="sub-tecnicos"><div class="submenu-item" onclick="openMod('tareas','Mis Tareas')">Mis Tareas</div><div class="submenu-item" onclick="openMod('agenda','Mi agenda')">Mi agenda</div></div><div class="menu-item"><span><i class="fas fa-building"></i> Lavado de Tanques</span></div></div><div class="tabs-outer"><div class="tabs-nav" id="tabs-list"></div></div><div id="main-content"></div><script>let tabs=[];function toggleMenu(){document.getElementById('menu-sidebar').classList.toggle('open');}function toggleSub(id){document.getElementById(id).classList.toggle('open');}function openMod(id,name){if(document.getElementById('menu-sidebar').classList.contains('open'))toggleMenu();if(!tabs.find(t=>t.id===id))tabs.push({id,name,active:true});selectTab(id);}function selectTab(id){tabs.forEach(t=>t.active=(t.id===id));renderTabs();renderView(id);}function closeTab(id){tabs=tabs.filter(t=>t.id!==id);if(tabs.length>0)selectTab(tabs[tabs.length-1].id);else document.getElementById('main-content').innerHTML='';renderTabs();}function renderTabs(){document.getElementById('tabs-list').innerHTML=tabs.map(t=>`<div class="tab ${t.active?'active-tab':''}" onclick="selectTab('${t.id}')"><i class="fas ${t.id==='agenda'?'fa-calendar-alt':(t.id==='tareas'?'fa-tasks':'fa-file-alt')}"></i> ${t.name} <i class="fas fa-times" onclick="event.stopPropagation();closeTab('${t.id}')"></i></div>`).join('');}function renderView(id){let h='';if(id==='tareas'){h=`<div class="title-bar"><span>MIS TAREAS</span></div><div class="content-area"><table><thead><tr><th>Tarea</th><th>Estado</th></tr></thead><tbody><tr><td><b>CONTROL DE PLAGAS - SMART FIT</b><br><small>Nit: 900.567.890-1</small></td><td><span style="color:#e67e22">En curso</span> <i class="fas fa-edit" onclick="openMod('detail','Gestionar Orden')"></i></td></tr></tbody></table></div>`;}else if(id==='agenda'){h=`<div class="title-bar"><span>MI AGENDA - EXPERTOS MIP</span></div><div class="content-area"><table><thead><tr><th>Servicio / Cliente</th><th>Contacto</th></tr></thead><tbody><tr onclick="openMod('detail','Gestionar Orden')"><td><b>FUMIGACIÓN</b><br>SPORTY CITY SAS - SMART FIT</td><td><a href="tel:3132922361" style="color:inherit;text-decoration:none"><i class="fas fa-phone"></i> 313 292 2361</a><br><small>Santiago Estepa</small></td></tr></tbody></table></div>`;}else if(id==='detail'){h=`<div class="title-bar"><span>GESTIÓN DE SERVICIO</span></div><div class="action-bar"><div class="btn-action active">E Evidencias</div><div class="btn-action" onclick="openMod('cert','Certificado')">Generar Certificado</div><div class="btn-action" onclick="selectTab('agenda')"><i class="fas fa-arrow-left"></i> Volver</div></div><div class="content-area" style="background:white"><div class="form-group"><label>Método de Control</label><select><option>Asperción</option><option>Nebulización</option></select></div><div class="sig-box"><div class="sig-line"></div></div><button class="btn-action"><i class="fas fa-paint-brush"></i> Limpiar Firma</button><div class="form-group" style="margin-top:20px"><label>Recibido por (Nombre y Cédula)</label><input type="text" placeholder="Ej: Santiago Estepa - 1.020.333.XXX"></div><div class="form-group"><label>Sello Corporativo</label><input type="file"></div></div>`;}else if(id==='cert'){h=`<div class="action-bar"><div class="btn-action" onclick="window.print()"><i class="fas fa-print"></i> Imprimir</div><div class="btn-action" onclick="selectTab('detail')">Volver a Edición</div></div><div class="cert-paper"><div class="cert-head"><div class="cert-logo-txt">Expertos MIP</div><div style="text-align:right;color:#555"><b>ORDEN DE SERVICIO</b><br>NIT: 901.417.316<br>Tel: 313 292 2361</div></div><div class="cert-info-grid"><div class="cert-info-item"><b>CLIENTE</b>SPORTY CITY SAS / SMART FIT</div><div class="cert-info-item"><b>DIRECCIÓN</b>BOGOTÁ, COLOMBIA</div><div class="cert-info-item"><b>TÉCNICO</b>JESÚS ANTONIO MARÍN</div><div class="cert-info-item"><b>MÉTODO</b>ASPERCIÓN</div></div><div style="background:#eee;padding:10px;font-size:0.8rem;font-weight:700;text-align:center;margin-bottom:10px">RESUMEN DEL SERVICIO REALIZADO</div><p style="font-size:0.8rem;line-height:1.4">Se certifica la realización del servicio de control de plagas y MIP en las instalaciones mencionadas, cumpliendo con los estándares de calidad de <b>Expertos en Fumigación SAS</b>.</p></div>`;}document.getElementById('main-content').innerHTML=h;}openMod('agenda','Mi agenda');</script></body></html>
