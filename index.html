<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--card:#ffffff;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--red-btn:#d63031;--table-header:#c2c9d6}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:100}.header-icons{display:flex;gap:20px;align-items:center}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0;overflow-x:auto}.tabs-nav{display:flex;flex:1}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px}.tab.active-tab{background:var(--accent);color:white}.title-bar{background:#5c6bc0;color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;font-weight:700}.content-area{padding:0}#menu-overlay{position:fixed;top:0;left:-100%;width:100%;height:100%;background:var(--header-bg);z-index:2000;transition:0.4s;padding:20px}#menu-overlay.open{left:0}.menu-btn-close{background:var(--accent);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:30px;cursor:pointer}.menu-item{padding:12px 0;color:rgba(255,255,255,0.9);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:0.95rem}.menu-item i:first-child{width:30px;font-size:1.1rem}.menu-label{flex:1;margin-left:10px}.submenu{background:rgba(0,0,0,0.2);padding-left:40px;display:none;margin-bottom:10px}.submenu.open{display:block}.submenu-item{padding:10px 0;color:rgba(255,255,255,0.7);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:10px}.submenu-item i{font-size:0.9rem;width:20px}/* TABLA ESTILO REFERENCIA */.tasks-table{width:100%;border-collapse:collapse;background:white;font-size:0.75rem}.tasks-table th{background:var(--table-header);color:var(--s);padding:10px 5px;text-align:left;font-weight:700;border-bottom:1px solid #ddd}.tasks-table th i{font-size:0.7rem;color:#777;margin-left:3px}.tasks-table td{padding:12px 5px;border-bottom:1px solid #eee;vertical-align:top}.tasks-table tr:nth-child(even){background:#fafafa}.col-edit{width:30px;text-align:center;color:var(--s)}.col-num{width:60px;text-align:right;padding-right:10px!important}.col-resp{width:120px;text-transform:uppercase}.col-task{color:red;font-weight:700}.pagination-bar{padding:15px;text-align:center;background:white;border-top:1px solid #ddd;font-size:0.8rem;color:#555}.page-controls{display:flex;justify-content:center;gap:20px;margin-top:10px;color:var(--s);font-size:1rem}</style></head><body><div id="app"><header><div onclick="toggleMenu()" style="cursor:pointer;font-size:1.3rem"><i class="fas fa-bars"></i></div><div class="header-icons"><i class="fas fa-search"></i><i class="fas fa-paint-roller"></i><i class="fas fa-bell"></i><i class="fas fa-user-circle" style="font-size:1.8rem"></i></div></header><div class="tabs-outer"><div class="tabs-nav" id="tabs-list"></div></div><div id="main-content"></div><div id="menu-overlay"><div class="menu-btn-close" onclick="toggleMenu()"><i class="fas fa-times" style="color:white;font-size:1.5rem"></i></div><div class="menu-item"><i class="fas fa-search"></i><span class="menu-label">Portal Clientes</span></div><div class="menu-item" onclick="toggleSub('sub-notif')"><i class="fas fa-bell"></i><span class="menu-label">Notificaciones</span><i class="fas fa-chevron-right"></i></div><div class="submenu" id="sub-notif"><div class="submenu-item" onclick="openModule('notif','Enviar notificación')">Enviar notificación</div><div class="submenu-item" onclick="openModule('outbox','Bandeja de salida')">Bandeja de salida</div></div><div class="menu-item" onclick="toggleSub('sub-tecnicos')"><i class="fas fa-motorcycle"></i><span class="menu-label">Técnicos</span><i class="fas fa-chevron-right"></i></div><div class="submenu" id="sub-tecnicos"><div class="submenu-item" onclick="openModule('tareas','Mis Tareas')"><i class="fas fa-walking"></i> Mis Tareas</div><div class="submenu-item" onclick="openModule('agenda','Mi agenda')"><i class="fas fa-calendar-alt"></i> Mi agenda</div><div class="submenu-item" onclick="openModule('inspeccion','Visitas de Inspección')"><i class="fas fa-check-double"></i> Visitas de Inspección</div><div class="submenu-item" onclick="openModule('multiservicios','multiservicios')"><i class="fas fa-university"></i> multiservicios</div></div></div></div><script>let openTabs=[];const date="14/07/2026";function toggleMenu(){document.getElementById('menu-overlay').classList.toggle('open');}function toggleSub(id){const sub=document.getElementById(id);sub.classList.toggle('open');}function openModule(id,name){toggleMenu();if(!openTabs.find(t=>t.id===id)){openTabs.push({id,name,active:true});}activateTab(id);}function renderTabs(){const list=document.getElementById('tabs-list');list.innerHTML=openTabs.map(t=>`<div class="tab ${t.active?'active-tab':''}" onclick="activateTab('${t.id}')">${t.name} <i class="fas fa-times" onclick="event.stopPropagation();closeTab('${t.id}')"></i></div>`).join('');}function activateTab(id){openTabs.forEach(t=>t.active=(t.id===id));renderTabs();renderContent(id);}function closeTab(id){openTabs=openTabs.filter(t=>t.id!==id);if(openTabs.length>0){activateTab(openTabs[openTabs.length-1].id);}else{document.getElementById('main-content').innerHTML='';renderTabs();}}function renderContent(id){let html=`<div class="title-bar"><span>${id==='tareas'?'INSTRUCCIONES Ó TARE...':id.toUpperCase()}</span><span>${date}</span></div><div class="content-area">`;if(id==='tareas'){html+=`<table class="tasks-table"><thead><tr><th></th><th>Orden Nº <i class="fas fa-sort"></i><i class="fas fa-thumbtack"></i></th><th>Responsable <i class="fas fa-sort"></i><i class="fas fa-thumbtack"></i></th><th>Tarea a Realizar</th></tr></thead><tbody><tr><td class="col-edit"><i class="far fa-edit"></i></td><td class="col-num">1.667</td><td class="col-resp">JESÚS ANTONIO MARÍN</td><td class="col-task">CONTROL PLAGAS (FUMIGACIÓN) 1 AP...</td></tr><tr><td class="col-edit"><i class="far fa-edit"></i></td><td class="col-num">1.817</td><td class="col-resp">JESÚS ANTONIO MARÍN</td><td class="col-task">CEBADO LÁMPARAS ADHEREN...</td></tr><tr><td class="col-edit"><i class="far fa-edit"></i></td><td class="col-num">2.728</td><td class="col-resp">JESÚS ANTONIO MARÍN</td><td class="col-task">ASPIRADO</td></tr><tr><td class="col-edit"><i class="far fa-edit"></i></td><td class="col-num">2.729</td><td class="col-resp">JESÚS ANTONIO MARÍN</td><td class="col-task">CONTROL PLAGAS (FUMIGACIÓN) 1 AP...</td></tr><tr><td class="col-edit"><i class="far fa-edit"></i></td><td class="col-num">2.732</td><td class="col-resp">JESÚS ANTONIO MARÍN</td><td class="col-task">ASPIRADO</td></tr></tbody></table><div class="pagination-bar"><div>[1 a 10 de 12]</div><div class="page-controls"><i class="fas fa-step-backward" style="opacity:0.3"></i><i class="fas fa-chevron-left" style="opacity:0.3"></i><i class="fas fa-chevron-right"></i><i class="fas fa-step-forward"></i></div></div>`;}else if(id==='notif'){html+=`<div style="padding:20px"><button style="background:var(--accent);color:white;padding:10px 20px;border-radius:25px;border:none;margin-bottom:20px">+ Enviar notificación</button></div>`;}html+='</div>';document.getElementById('main-content').innerHTML=html;}
// Auto-open Mis Tareas for preview
openModule('tareas', 'Mis Tareas');
</script></body></html>
