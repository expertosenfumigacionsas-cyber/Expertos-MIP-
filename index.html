<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--card:#ffffff;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--red-btn:#d63031}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:100}.header-icons{display:flex;gap:20px;align-items:center}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0;overflow-x:auto}.tabs-nav{display:flex;flex:1}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px}.tab.active-tab{background:var(--accent);color:white}.title-bar{background:#5c6bc0;color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;font-weight:700}.content-area{padding:15px}.view{display:none}.view.active-view{display:block}#menu-overlay{position:fixed;top:0;left:-100%;width:100%;height:100%;background:var(--header-bg);z-index:2000;transition:0.4s;padding:20px}#menu-overlay.open{left:0}.menu-btn-close{background:var(--accent);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:30px;cursor:pointer}.menu-item{padding:12px 0;color:rgba(255,255,255,0.9);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:0.95rem}.menu-item i:first-child{width:30px;font-size:1.1rem}.menu-label{flex:1;margin-left:10px}.submenu{background:rgba(0,0,0,0.2);padding-left:40px;display:none}.submenu.open{display:block}.submenu-item{padding:10px 0;color:rgba(255,255,255,0.7);font-size:0.85rem;cursor:pointer}</style></head><body><div id="app"><header><div onclick="toggleMenu()" style="cursor:pointer;font-size:1.3rem"><i class="fas fa-bars"></i></div><div class="header-icons"><i class="fas fa-search"></i><i class="fas fa-paint-roller"></i><i class="fas fa-bell"></i><i class="fas fa-user-circle" style="font-size:1.8rem"></i></div></header><div class="tabs-outer"><div class="tabs-nav" id="tabs-list"></div></div><div id="main-content"></div><div id="menu-overlay"><div class="menu-btn-close" onclick="toggleMenu()"><i class="fas fa-times" style="color:white;font-size:1.5rem"></i></div><div class="menu-item"><i class="fas fa-search"></i><span class="menu-label">Portal Clientes</span></div><div class="menu-item" onclick="toggleSub('sub-notif')"><i class="fas fa-bell"></i><span class="menu-label">Notificaciones</span><i class="fas fa-chevron-right"></i></div><div class="submenu" id="sub-notif"><div class="submenu-item" onclick="openModule('notif','Enviar notificación')">Enviar notificación</div><div class="submenu-item" onclick="openModule('outbox','Bandeja de salida')">Bandeja de salida</div></div><div class="menu-item"><i class="fas fa-motorcycle"></i><span class="menu-label">Técnicos</span><i class="fas fa-chevron-right"></i></div><div class="menu-item"><i class="fas fa-cloud-rain"></i><span class="menu-label">Gestor de Archivos</span></div><div class="menu-item"><i class="fas fa-briefcase"></i><span class="menu-label">Gestión Comercial</span><i class="fas fa-chevron-right"></i></div><div class="menu-item"><i class="fas fa-hammer"></i><span class="menu-label">Gestión Operativa</span><i class="fas fa-chevron-right"></i></div><div class="menu-item"><i class="fas fa-cog"></i><span class="menu-label">Gestión Administrativa</span><i class="fas fa-chevron-right"></i></div><div class="menu-item"><i class="fas fa-phone-alt"></i><span class="menu-label">Gerencial empresarial</span><i class="fas fa-chevron-right"></i></div><div class="menu-item"><i class="fas fa-code"></i><span class="menu-label">Mantenimientos del Sistema</span><i class="fas fa-chevron-right"></i></div></div></div><script>let openTabs=[];function toggleMenu(){document.getElementById('menu-overlay').classList.toggle('open');}function toggleSub(id){const sub=document.getElementById(id);sub.classList.toggle('open');}function openModule(id,name){toggleMenu();if(!openTabs.find(t=>t.id===id)){openTabs.push({id,name});}renderTabs();renderContent(id);}function renderTabs(){const list=document.getElementById('tabs-list');list.innerHTML=openTabs.map(t=>`<div class="tab ${t.active?'active-tab':''}" onclick="activateTab('${t.id}')">${t.name} <i class="fas fa-times" onclick="event.stopPropagation();closeTab('${t.id}')"></i></div>`).join('');}function activateTab(id){openTabs.forEach(t=>t.active=(t.id===id));renderTabs();renderContent(id);}function closeTab(id){openTabs=openTabs.filter(t=>t.id!==id);if(openTabs.length>0){activateTab(openTabs[openTabs.length-1].id);}else{document.getElementById('main-content').innerHTML='';renderTabs();}}function renderContent(id){let html='';const date="14/07/2026";if(id==='notif'){html=`<div class="title-bar"><span>ENVIAR NOTIFICACIÓN</span><span>${date}</span></div><div class="content-area"><button style="background:var(--accent);color:white;padding:10px 20px;border-radius:25px;border:none;margin-bottom:20px">+ Enviar notificación</button><div style="margin-bottom:15px"><label style="font-weight:700">Título <span style="color:red">*</span></label><input type="text" style="width:100%;padding:12px;border:1px solid #ccc;border-radius:6px;margin-top:8px"></div><div style="margin-bottom:15px"><label style="font-weight:700">Mensaje <span style="color:red">*</span></label><div style="border:1px solid #ccc;border-radius:6px;min-height:200px;margin-top:8px;background:white"></div></div></div>`;}else if(id==='outbox'){html=`<div class="title-bar"><span>BANDEJA DE SALIDA</span><span>${date}</span></div><div class="content-area"><div style="display:flex;gap:10px;margin-bottom:15px"><button style="background:var(--red-btn);color:white;padding:10px 18px;border-radius:25px;border:none;font-weight:700"><i class="fas fa-trash-alt"></i> Borrar</button><div style="display:flex;background:white;border:1px solid #ccc;border-radius:6px;flex:1;align-items:center"><input type="text" placeholder="Búsqueda Rápida" style="border:none;padding:10px;flex:1;outline:none"><div style="padding:10px;color:#777;border-left:1px solid #eee"><i class="fas fa-search"></i></div></div></div><div style="background:#eef0f3;padding:10px;text-align:center;font-size:0.85rem;color:#555;border:1px solid #d1d5db">No hay registros para mostrar</div></div>`;}document.getElementById('main-content').innerHTML=html;}</script></body></html>
