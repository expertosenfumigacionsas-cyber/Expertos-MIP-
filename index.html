<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP - Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--primary:#0d0e2b;--secondary:#5c6bc0;--accent:#c0392b;--bg:#f8f9fa;--text:#2c3e50;--white:#ffffff;--success:#27ae60;--whatsapp:#25d366;--google:#4285f4}*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}body{background:var(--bg);color:var(--text);min-height:100vh}.login-container{max-width:400px;margin:100px auto;padding:30px;background:var(--white);border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);text-align:center}.login-input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:6px;font-size:1rem}.login-btn{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:6px;font-size:1rem;font-weight:bold;cursor:pointer}.app-shell{display:none}header{background:var(--primary);color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}.main-nav{background:white;display:flex;overflow-x:auto;padding:10px;border-bottom:1px solid #eee;gap:10px}.nav-item{padding:8px 18px;background:#f0f2f5;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px}.nav-item.active{background:var(--secondary);color:white}.content{padding:15px}.section-title{font-size:1.1rem;font-weight:700;margin-bottom:15px;color:var(--primary);display:flex;align-items:center;gap:10px}.card{background:white;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}.form-group{margin-bottom:15px}.form-group label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:5px}.form-group input, .form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}.btn-sync{width:100%;padding:10px;margin-top:5px;border:none;border-radius:6px;font-size:0.85rem;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:white}.btn-google{background:var(--google)}.btn-whatsapp{background:var(--whatsapp)}.agenda-list-item{border-left:4px solid var(--secondary);padding-left:10px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}</style></head><body><div id="login-screen" class="login-container"><h1>Expertos MIP</h1><p>Control de Plagas y Fumigación</p><input type="text" class="login-input" placeholder="Usuario" id="user"><input type="password" class="login-input" placeholder="Contraseña" id="pass"><button class="login-btn" onclick="login()">Ingresar</button></div><div id="app-screen" class="app-shell"><header><div><i class="fas fa-shield-virus"></i> Expertos MIP</div><div id="u-name" style="font-size:0.8rem"></div></header><nav class="main-nav"><div class="nav-item active" onclick="showV('agenda')"><i class="fas fa-calendar-plus"></i> Agendar</div><div class="nav-item" onclick="showV('productos')"><i class="fas fa-spray-can"></i> Insecticidas</div></nav><div id="app-content" class="content"></div></div><script>let scheduled=[];function login(){const u=document.getElementById('user').value;if(u){document.getElementById('login-screen').style.display='none';document.getElementById('app-screen').style.display='block';document.getElementById('u-name').innerText=u;showV('agenda');}}function showV(v){const c=document.getElementById('app-content');document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));if(event)event.currentTarget.classList.add('active');if(v==='productos'){c.innerHTML=`<div class="section-title">Insecticidas</div><div class="card" style="padding:10px;margin-bottom:10px"><b>Delta-MIP 2.5</b><br><small>Residualidad extendida.</small></div><div class="card" style="padding:10px"><b>Cyper-Expert</b><br><small>Control inmediato de rastreros.</small></div>`;}else if(v==='agenda'){c.innerHTML=`<div class="section-title">Agendar Servicio</div><div class="card" style="padding:15px"><div class="form-group"><label>Empresa / Cliente</label><input type="text" id="c-name" placeholder="Ej: Smart Fit"></div><div class="form-group"><label>Fecha y Hora</label><input type="datetime-local" id="c-date"></div><div class="form-group"><label>Servicio</label><select id="c-type"><option>Control de Plagas</option><option>Lavado de Tanques</option><option>Desinfección</option></select></div><button class="login-btn" onclick="addS()">Guardar en Agenda Local</button></div><div id="s-list">${scheduled.length?scheduled.map((s,i)=>`<div class="card agenda-list-item"><div><b>${s.client}</b><br><small>${s.date.replace('T',' ')}</small></div><div style="display:flex;flex-direction:column;gap:5px"><button class="btn-sync btn-google" onclick="syncG('${s.client}','${s.date}','${s.type}')"><i class="fab fa-google"></i> Calendar</button><button class="btn-sync btn-whatsapp" onclick="syncW('${s.client}','${s.date}','${s.type}')"><i class="fab fa-whatsapp"></i> Notificar</button></div></div>`).join(''):'<p style="font-size:0.8rem;color:#999;text-align:center">No hay servicios pendientes.</p>'}</div>`;}}function addS(){const client=document.getElementById('c-name').value,date=document.getElementById('c-date').value,type=document.getElementById('c-type').value;if(client&&date){scheduled.push({client,date,type});showV('agenda');}else alert('Complete los datos');}function syncG(c,d,t){const start=d.replace(/[-:]/g,'')+'00',end=d.replace(/[-:]/g,'')+'00';const url=`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t+' - '+c)}&dates=${start}/${end}&details=${encodeURIComponent('Servicio programado por Expertos MIP')}`;window.open(url,'_blank');}function syncW(c,d,t){const msg=`Hola, confirmamos el servicio de ${t} para ${c} el día ${d.replace('T',' a las ')}. - Expertos MIP`;window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');}</script></body></html>
