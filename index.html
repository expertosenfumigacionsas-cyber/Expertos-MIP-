<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--table-header:#40526e;--blue-light:#7d89ff;--exp-red:#c0392b}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:1000}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0;overflow-x:auto;position:sticky;top:60px;z-index:900}.tabs-nav{display:flex;flex:1}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px;border:1px solid #ccc;border-bottom:none}.tab.active-tab{background:var(--accent);color:white;border-color:var(--accent)}#menu-sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--header-bg);z-index:2000;transition:0.3s;padding:20px;color:white}#menu-sidebar.open{left:0}.menu-close{background:var(--accent);width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:30px;cursor:pointer}.menu-item{padding:15px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;display:flex;justify-content:space-between;align-items:center}.submenu{padding-left:30px;display:none;background:rgba(0,0,0,0.2)}.submenu.open{display:block}.submenu-item{padding:12px 0;color:rgba(255,255,255,0.7);font-size:0.9rem;cursor:pointer}.title-bar{background:var(--blue-light);color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;font-weight:700}.action-bar{background:white;padding:10px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid #ddd}.btn-action{background:#f0f2f5;border:1px solid #d1d5db;padding:8px 15px;border-radius:4px;font-size:0.8rem;color:#333;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer}.btn-action.active{background:var(--accent);color:white}.content-area{padding:10px}table{width:100%;border-collapse:collapse;background:white;font-size:0.8rem}th{background:var(--table-header);color:white;padding:10px;text-align:left}td{padding:12px 10px;border-bottom:1px solid #eee}.sig-box{border:1px solid #ddd;height:150px;background:#f9f9f9;margin:10px 0;position:relative}.sig-line{position:absolute;bottom:40px;left:10%;width:80%;height:1px;background:#ccc}.form-group{margin-bottom:15px}.form-group label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:5px;color:#555}.form-group input, .form-group select, .form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px}.cert-paper{background:white;padding:20px;border:1px solid #ddd;max-width:800px;margin:auto;font-family:Arial, sans-serif}.cert-head{display:flex;justify-content:space-between;border-bottom:3px solid var(--exp-red);padding-bottom:10px;margin-bottom:15px}</style></head><body><header><div onclick="toggleMenu()" style="cursor:pointer"><i class="fas fa-bars fa-lg"></i></div><div style="font-weight:800;font-size:1.2rem">Expertos MIP</div><div style="display:flex;gap:15px"><i class="fas fa-bell"></i><i class="fas fa-user-circle fa-lg"></i></div></header><div id="menu-sidebar"><div class="menu-close" onclick="toggleMenu()"><i class="fas fa-times"></i></div><div class="menu-item" onclick="toggleSub('sub-tecnicos')"><span><i class="fas fa-motorcycle"></i> Técnicos</span><i class="fas fa-chevron-down"></i></div><div class="submenu" id="sub-tecnicos"><div class="submenu-item" onclick="openMod('tareas','Mis Tareas')">Mis Tareas</div><div class="submenu-item" onclick="openMod('agenda','Mi agenda')">Mi agenda</div></div></div><div class="tabs-outer"><div class="tabs-nav" id="tabs-list"></div></div><div id="main-content"></div><script>let tabs=[];function toggleMenu(){document.getElementById('menu-sidebar').classList.toggle('open');}function toggleSub(id){document.getElementById(id).classList.toggle('open');}function openMod(id,name){toggleMenu();if(!tabs.find(t=>t.id===id))tabs.push({id,name,active:true});selectTab(id);}function selectTab(id){tabs.forEach(t=>t.active=(t.id===id));renderTabs();renderView(id);}function closeTab(id){tabs=tabs.filter(t=>t.id!==id);if(tabs.length>0)selectTab(tabs[tabs.length-1].id);else document.getElementById('main-content').innerHTML='';renderTabs();}function renderTabs(){document.getElementById('tabs-list').innerHTML=tabs.map(t=>`<div class="tab ${t.active?'active-tab':''}" onclick="selectTab('${t.id}')">${t.name} <i class="fas fa-times" onclick="event.stopPropagation();closeTab('${t.id}')"></i></div>`).join('');}function renderView(id){let h='';if(id==='tareas'){h=`<div class="title-bar"><span>MIS TAREAS</span></div><div class="content-area"><table><thead><tr><th>Tarea</th><th>Estado</th></tr></thead><tbody><tr><td style="color:red;font-weight:bold">FUMIGACIÓN SMART FIT</td><td>Pendiente <i class="fas fa-pencil-alt" onclick="openMod('detail','Editar')"></i></td></tr></tbody></table></div>`;}else if(id==='agenda'){h=`<div class="title-bar"><span>MI AGENDA</span></div><div class="content-area"><table><thead><tr><th>Servicio</th><th>Cliente</th></tr></thead><tbody><tr onclick="openMod('detail','Gestionar')"><td>CONTROL DE PLAGAS <br><small>Tel: 310XXXXXXX</small></td><td>SMART FIT SANTA BARBARA</td></tr></tbody></table></div>`;}else if(id==='detail'){h=`<div class="title-bar"><span>DATOS DE LA ORDEN</span></div><div class="action-bar"><div class="btn-action active">E Evidencias</div><div class="btn-action" onclick="openMod('cert','Certificado')">Ver Certificado</div><div class="btn-action" onclick="selectTab('agenda')">Volver</div></div><div class="content-area" style="background:white"><div class="sig-box"><div class="sig-line"></div></div><button class="btn-action"><i class="fas fa-paint-brush"></i> Reiniciar</button><div class="form-group" style="margin-top:20px"><label>Recibido por</label><input type="text" placeholder="Nombre del cliente"></div><div class="form-group"><label>Estado</label><select><option>Confirmada</option></select></div></div>`;}else if(id==='cert'){h=`<div class="action-bar"><div class="btn-action" onclick="window.print()">Imprimir</div><div class="btn-action" onclick="selectTab('detail')">Volver</div></div><div class="cert-paper"><div class="cert-head"><div style="color:var(--exp-red);font-weight:900;font-size:1.5rem">Expertos MIP</div><div style="text-align:right">Orden N° 003782</div></div><p><strong>Certificado de Servicio</strong></p><p>Cliente: SPORTY CITY SAS</p><p>Sede: SMART FIT SANTA BÁRBARA</p><hr><p>Servicio realizado satisfactoriamente siguiendo protocolos MIP.</p></div>`;}document.getElementById('main-content').innerHTML=h;}openMod('agenda','Mi agenda');</script></body></html>
