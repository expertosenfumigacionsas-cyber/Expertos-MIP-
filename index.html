<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expertos MIP - Acceso</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #27ae60; --s: #2980b9; --t: #f39c12; --dark: #1a1a1a; }
        body { margin: 0; font-family: sans-serif; background: var(--dark); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 40px 20px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem; }
        .btn { width: 100%; height: 75px; border: none; border-radius: 20px; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .owner { background: var(--p); }
        .prog { background: var(--s); }
        .tech { background: var(--t); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Expertos MIP</h2>
        <p>Selecciona tu perfil de ingreso</p>
        
        <button class="btn owner" onclick="go('admin')"><i class="fas fa-user-tie"></i> SOY EL DUEÑO</button>
        <button class="btn prog" onclick="go('prog')"><i class="fas fa-code"></i> PROGRAMADOR</button>
        <button class="btn tech" onclick="go('tech')"><i class="fas fa-briefcase"></i> SOY TÉCNICO</button>
    </div>

    <script>
    function go(role) {
        const user = {
            admin: {id:1, nombre:'Dueño', rol:'admin'},
            prog: {id:99, nombre:'Programador', rol:'admin'},
            tech: {id:2, nombre:'Técnico', rol:'tecnico'}
        }[role];
        
        localStorage.setItem('mip_session', JSON.stringify(user));
        alert('Bienvenido ' + user.nombre);
        // Redirigir o recargar para mostrar la app
        location.reload();
    }
    
    window.onload = function() {
        if(localStorage.getItem('mip_session')) {
            // Aquí se cargaría el Dashboard Pro que hicimos en el paso anterior
            document.body.innerHTML = '<div style="color:white; text-align:center; padding-top:100px;"><h1>Cargando Panel...</h1><p>Entrando al sistema MIP</p></div>';
            setTimeout(() => { location.href = "index.html"; }, 500); 
        }
    };
    </script>
</body>
</html>
