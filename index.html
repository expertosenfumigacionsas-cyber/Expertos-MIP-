<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#2ecc71;--d:#0d0e2b;--s:#1a1b3a;--c:#1abc9c;--bg:#f4f5f7;--txt:#333;--card:#ffffff;--accent:#5c6bc0;--header-bg:#0d0e2b;--tab-bg:#e1e2ef;--red-btn:#d63031}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}body{background:var(--bg);color:var(--txt);min-height:100vh}header{background:var(--header-bg);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white}.header-icons{display:flex;gap:20px;align-items:center}.tabs-outer{background:#dcdde1;display:flex;align-items:center;padding:5px 5px 0}.tabs-nav{display:flex;overflow-x:auto;flex:1}.tabs-nav::-webkit-scrollbar{display:none}.tab{background:var(--tab-bg);padding:10px 15px;border-radius:10px 10px 0 0;margin-right:5px;display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--d);font-weight:600;white-space:nowrap;cursor:pointer;min-width:140px}.tab.active-tab{background:var(--accent);color:white}.tab-arrow{padding:10px;color:var(--accent);font-weight:900}.title-bar{background:#5c6bc0;color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;font-weight:700}.content-area{padding:15px}.toolbar{display:flex;gap:10px;margin-bottom:15px}.btn-delete{background:var(--red-btn);color:white;border:none;padding:10px 18px;border-radius:25px;font-weight:700;display:flex;align-items:center;gap:8px;font-size:0.85rem}.search-box{display:flex;background:white;border:1px solid #ccd1d9;border-radius:6px;flex:1;overflow:hidden;align-items:center}.search-box input{border:none;padding:10px;flex:1;outline:none;font-size:0.9rem}.search-box .search-btn{background:white;padding:10px;color:#777;border-left:1px solid #eee}.empty-state{background:#eef0f3;padding:10px;text-align:center;font-size:0.85rem;color:#555;border:1px solid #d1d5db}#menu-overlay{position:fixed;top:0;left:-100%;width:100%;height:100%;background:var(--header-bg);z-index:2000;transition:0.4s;padding:20px}#menu-overlay.open{left:0}.view{display:none}.view.active-view{display:block}</style></head><body><div id="app"><header><div onclick="toggleMenu()" style="cursor:pointer;font-size:1.3rem"><i class="fas fa-bars"></i></div><div class="header-icons"><i class="fas fa-search"></i><i class="fas fa-paint-roller"></i><i class="fas fa-bell"></i><i class="fas fa-user-circle" style="font-size:1.8rem"></i></div></header><div class="tabs-outer"><i class="fas fa-chevron-left tab-arrow"></i><div class="tabs-nav"><div class="tab" onclick="switchView('v-notif')">Enviar notificación <i class="fas fa-times"></i></div><div class="tab active-tab" onclick="switchView('v-outbox')"><i class="fas fa-external-link-alt"></i> Bandeja de salida <i class="fas fa-times"></i></div></div><i class="fas fa-chevron-right tab-arrow"></i></div><div id="v-outbox" class="view active-view"><div class="title-bar"><span>BANDEJA DE SALIDA</span><span>14/07/2026</span></div><div class="content-area"><div class="toolbar"><button class="btn-delete"><i class="fas fa-trash-alt"></i> Borrar</button><div class="search-box"><input type="text" placeholder="Búsqueda Rápida"><div class="search-btn"><i class="fas fa-caret-down"></i> <i class="fas fa-search"></i></div></div></div><div class="empty-state">No hay registros para mostrar</div></div></div><div id="v-notif" class="view"><div class="title-bar"><span>ENVIAR NOTIFICACIÓN</span><span>14/07/2026</span></div><div class="content-area"><div class="toolbar"><button style="background:var(--accent);color:white;padding:10px 18px;border-radius:25px;border:none;font-weight:700">+ Enviar notificación</button></div><div style="margin-bottom:15px"><label style="font-weight:700;font-size:0.8rem">Título <span style="color:red">*</span></label><input type="text" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:5px;margin-top:5px"></div><div style="margin-bottom:15px"><label style="font-weight:700;font-size:0.8rem">Mensaje <span style="color:red">*</span></label><div style="border:1px solid #ccc;border-radius:5px;background:white;min-height:200px;margin-top:5px"></div></div></div></div><div id="menu-overlay"><div style="background:var(--accent);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-bottom:20px" onclick="toggleMenu()"><i class="fas fa-times" style="color:white"></i></div><div style="color:white;padding:15px" onclick="switchView('v-outbox');toggleMenu()">Bandeja de Salida</div><div style="color:white;padding:15px" onclick="switchView('v-notif');toggleMenu()">Enviar Notificación</div></div></div><script>function toggleMenu(){document.getElementById('menu-overlay').classList.toggle('open');}function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active-view'));document.getElementById(id).classList.add('active-view');document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active-tab');if(t.innerText.toLowerCase().includes(id.replace('v-','').toLowerCase())){t.classList.add('active-tab');}});}</script></body></html>
