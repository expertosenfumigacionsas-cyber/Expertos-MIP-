<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#27ae60;--s:#2980b9;--t:#f39c12;--d:#1a1a1a;--l:#f4f7f6}*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}body{background:var(--l);color:#333}#ls{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--d);display:flex;align-items:center;justify-content:center;z-index:10000}.card-login{background:white;padding:40px 30px;border-radius:30px;width:90%;max-width:400px;text-align:center}.logo-main{font-size:5rem;color:var(--p);margin-bottom:10px}.btn-role{width:100%;height:60px;border:none;border-radius:15px;font-size:1rem;font-weight:bold;color:white;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}input#uname{width:100%;padding:15px;margin-bottom:20px;border:2px solid #eee;border-radius:12px;text-align:center;font-size:1.1rem}#app{display:none;padding-bottom:80px}header{background:var(--p);color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}.header-logo{display:flex;align-items:center;gap:10px;font-weight:bold;font-size:1.2rem}.view{display:none;padding:20px;animation:fadeIn 0.4s}.view.active{display:block}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}.item{background:white;padding:25px 15px;border-radius:25px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.05);cursor:pointer}.item i{font-size:2.8rem;margin-bottom:12px;display:block;color:var(--p)}.disabled{opacity:0.3;filter:grayscale(1);pointer-events:none}nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:15px;border-top:1px solid #eee;z-index:1000}nav button{border:none;background:none;color:#ccc;font-size:1.6rem}nav button.active{color:var(--p)}</style></head><body>
<div id="ls"><div class="card-login"><i class="fas fa-bug logo-main"></i><h1 style="color:var(--d);font-size:1.8rem;margin-bottom:5px">EXPERTOS MIP</h1><p style="margin-bottom:25px;color:#777">Control de Plagas</p><input type="text" id="uname" placeholder="👤 Su Nombre"><button class="btn-role" style="background:var(--p)" onclick="login('admin')"><i class="fas fa-user-shield"></i> DUEÑO</button><button class="btn-role" style="background:var(--s)" onclick="login('prog')"><i class="fas fa-laptop-code"></i> PROGRAMADOR</button><button class="btn-role" style="background:var(--t)" onclick="login('tech')"><i class="fas fa-briefcase"></i> TÉCNICO</button></div></div>
<div id="app"><header><div class="header-logo"><i class="fas fa-bug"></i> EXPERTOS MIP</div><span id="role-tag" style="background:rgba(255,255,255,0.2);padding:5px 12px;border-radius:20px;font-size:0.8rem"></span></header>
<div id="v-home" class="view active"><div style="display:flex;align-items:center;gap:10px;margin-bottom:20px"><i class="fas fa-bug" style="color:var(--p);font-size:1.5rem"></i><h3 style="color:#555">Panel Principal</h3></div><div class="grid" id="main-menu"></div></div>
<div id="v-serv" class="view"><h3><i class="fas fa-bug"></i> Nuevo Servicio</h3><p style="margin-top:20px;color:#888">Formulario Activo</p><button class="btn-role" style="background:var(--p);margin-top:20px" onclick="go('v-home')">Volver</button></div>
<nav><button onclick="go('v-home')" id="n-h" class="active"><i class="fas fa-home"></i></button><button onclick="go('v-serv')"><i class="fas fa-bug"></i></button><button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></nav></div>
<script>
function login(r){
const user = document.getElementById('uname').value.trim() || 'Experto';
const profiles = {admin: {n:user,r:'admin',c:'#27ae60',t:'DUEÑO'},prog:{n:user,r:'admin',c:'#2980b9',t:'PROG'},tech:{n:user,r:'tech',c:'#f39c12',t:'TÉCNICO'}};
localStorage.setItem('mip_legacy_session', JSON.stringify(profiles[r]));
render();
}
function render(){
const s = localStorage.getItem('mip_legacy_session');
if(!s) return;
const u = JSON.parse(s);
document.getElementById('ls').style.display = 'none';
document.getElementById('app').style.display = 'block';
document.getElementById('role-tag').innerText = u.n + ' | ' + u.t;
document.getElementById('role-tag').style.background = u.c;
const grid = document.getElementById('main-menu');
grid.innerHTML = '';
const modules = [
{n:'Servicio',i:'fa-bug',v:'v-serv',p:['admin','tech']},{n:'Clientes',i:'fa-users',v:'v-home',p:['admin']},{n:'Agenda',i:'fa-calendar-alt',v:'v-home',p:['admin','tech']},{n:'Insumos',i:'fa-pills',v:'v-home',p:['admin','tech']},{n:'Reportes',i:'fa-file-pdf',v:'v-home',p:['admin']},{n:'Ajustes',i:'fa-cog',v:'v-home',p:['admin']}
];
modules.forEach(m => {
const acc = m.p.includes(u.r);
const div = document.createElement('div');
div.className = 'item' + (acc ? '' : ' disabled');
div.innerHTML = `<i class="fas ${m.i}"></i><span style="font-weight:bold;color:#444">${m.n}</span>`;
if(acc) div.onclick = () => go(m.v);
grid.appendChild(div);
});
}
function go(id){
document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
if(id === 'v-home') document.getElementById('n-h').classList.add('active');
}
function logout(){localStorage.clear();location.reload();}
window.onload = render;
</script></body></html>
