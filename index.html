<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Expertos MIP Pro</title><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><style>:root{--p:#1abc9c;--d:#0d1124}*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}body{background:#f4f7f6}#ls{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--d);display:flex;align-items:center;justify-content:center;z-index:10000}.card-login{background:white;padding:40px 20px;border-radius:30px;width:95%;max-width:400px;text-align:center}.logo-f{position:relative;width:280px;height:180px;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}.cross{width:140px;height:140px;border:6px solid var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--d);position:relative}.cross::before{content:'';position:absolute;width:6px;height:30px;background:var(--p);top:-20px}.cross i.fa-mouse{color:white;font-size:3.5rem}.banner{background:var(--d);width:300px;padding:15px 5px;border-radius:15px 15px 5px 5px;text-align:center;color:var(--p);margin-top:-30px;z-index:10}.banner h1{font-size:2.2rem;font-weight:900;margin:0}.banner p{font-size:0.5rem;color:white;margin-top:5px}#app{display:none;padding-bottom:80px}header{background:var(--d);color:var(--p);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--p)}.view{display:none;padding:20px}.view.active{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:10px}.item{background:white;padding:20px;border-radius:20px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.05);cursor:pointer}.item i{font-size:2.2rem;margin-bottom:10px;display:block;color:var(--d)}input,select,textarea{width:100%;padding:15px;margin-bottom:10px;border:1px solid #ddd;border-radius:12px}button{width:100%;height:60px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:15px;border-top:1px solid #eee}#canvas{border:2px dashed var(--p);background:white;border-radius:10px;width:100%;touch-action:none}</style></head><body>
<div id="ls"><div class="card-login"><div class="logo-f"><div class="cross"><i class="fas fa-mouse"></i></div><div class="banner"><h1>EXPERTOS</h1><p>FUMIGACIONES - CONTROL DE PLAGAS - LAVADO DE TANQUES</p></div></div><input type="text" id="un" placeholder="👤 Nombre"><select id="ur"><option value="admin">DUEÑO</option><option value="tech">TÉCNICO</option></select><button style="background:var(--d);color:var(--p)" onclick="login()">INGRESAR</button></div></div>
<div id="app"><header><div style="font-weight:900">EXPERTOS MIP</div><span id="rt" style="background:var(--p);color:var(--d);padding:4px 10px;border-radius:10px;font-size:0.7rem;font-weight:bold"></span></header>
<div id="v-home" class="view active"><h3>Servicios del Día</h3><div id="job-list"></div><div class="grid" id="mm"></div></div>
<div id="v-serv" class="view"><h3>Reporte de Servicio</h3><input type="text" id="s-cli" placeholder="Nombre Cliente"><input type="text" id="s-tel" placeholder="WhatsApp Cliente"><textarea id="s-rec" placeholder="Recomendaciones Técnicas"></textarea><label>Firma Cliente</label><canvas id="canvas" height="150"></canvas>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px"><button style="background:orange;color:white;height:50px" onclick="setStatus('EN PROCESO')">EN PROCESO</button><button style="background:green;color:white;height:50px" onclick="setStatus('REALIZADO')">REALIZADO</button></div><button style="background:#007bff;color:white;margin-top:20px;width:100%" onclick="saveAll()"><i class="fas fa-save"></i> GUARDAR TODO</button><button style="background:var(--d);color:var(--p);margin-top:10px;width:100%" onclick="finishJob()"><i class="fab fa-whatsapp"></i> ENVIAR CERTIFICADO</button></div>
<nav><button onclick="go('v-home')"><i class="fas fa-home"></i></button><button id="btnT" onclick="alert('Panel Técnicos')"><i class="fas fa-users-cog"></i></button><button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></nav></div>
<script>
let canvas, ctx, drawing = false, currentStatus = 'PENDIENTE';
function login(){const u=document.getElementById('un').value;const r=document.getElementById('ur').value;if(!u)return alert('Ponga nombre');localStorage.setItem('mip_s',JSON.stringify({n:u,r:r}));location.reload();}
const s=localStorage.getItem('mip_s');if(s){const u=JSON.parse(s);document.getElementById('ls').style.display='none';document.getElementById('app').style.display='block';document.getElementById('rt').innerText=u.n+' | '+u.r.toUpperCase();renderM(u.r);if(u.r==='tech')document.getElementById('btnT').style.display='none';}
function renderM(r){const g=document.getElementById('mm');g.innerHTML='';const m=[{n:'Nuevo Servicio',i:'fa-plus-circle',v:'v-serv',p:['admin','tech']},{n:'Historial',i:'fa-history',v:'v-home',p:['admin','tech']}];m.forEach(i=>{if(i.p.includes(r))g.innerHTML+=`<div class="item" onclick="go('${i.v}')"><i class="fas ${i.i}"></i><b>${i.n}</b></div>`});}
function go(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='v-serv') setTimeout(initPad,100);}
function initPad(){canvas=document.getElementById('canvas');if(!canvas)return;ctx=canvas.getContext('2d');canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',stop);canvas.addEventListener('touchstart',start);canvas.addEventListener('touchmove',draw);canvas.addEventListener('touchend',stop);}
function start(e){drawing=true;ctx.beginPath();const rect=canvas.getBoundingClientRect();const x=(e.clientX||e.touches[0].clientX)-rect.left;const y=(e.clientY||e.touches[0].clientY)-rect.top;ctx.moveTo(x,y);e.preventDefault();}
function draw(e){if(!drawing)return;const rect=canvas.getBoundingClientRect();const x=(e.clientX||e.touches[0].clientX)-rect.left;const y=(e.clientY||e.touches[0].clientY)-rect.top;ctx.lineTo(x,y);ctx.stroke();e.preventDefault();}
function stop(){drawing=false;}
function setStatus(st){currentStatus=st;alert('Estado: ' + st);}
function saveAll(){
const cli=document.getElementById('s-cli').value;
if(!cli) return alert('Ingrese nombre de cliente');
let jobs = JSON.parse(localStorage.getItem('mip_jobs')||'[]');
jobs.push({cli:cli, status:currentStatus, date:new Date().toLocaleString()});
localStorage.setItem('mip_jobs',JSON.stringify(jobs));
alert('✅ DATOS GUARDADOS EN EL SISTEMA');
}
function finishJob(){
const cli=document.getElementById('s-cli').value;const tel=document.getElementById('s-tel').value;const rec=document.getElementById('s-rec').value;
if(!tel) return alert('Ingrese WhatsApp del cliente');
const msg = `*EXPERTOS MIP - REPORTE*%0A%0A*Cliente:* ${cli}%0A*Estado:* ${currentStatus}%0A*Recomendaciones:* ${rec}`;
window.open(`https://wa.me/${tel}?text=${msg}`);
}
function logout(){localStorage.clear();location.reload()}
</script></body></html>
